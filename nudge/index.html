<!DOCTYPE html>
<html lang="en" data-mode="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Nudge — Your money, your pace.</title>

<!-- PWA: makes it installable as a home screen app -->
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#2D7D46"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Nudge"/>
<link rel="apple-touch-icon" href="icon-192.png"/>

<!-- Safe area for notched phones -->
<style>
  body { padding-bottom: env(safe-area-inset-bottom); }
  .quick-log-fab { bottom: calc(24px + env(safe-area-inset-bottom)); }
</style>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* ── calm neutral palette ── */
  --bg:#F6F6F6;--sur:#FFFFFF;--sur2:#EFEFEF;--sur3:#E4E4E4;
  --tx:#222222;--tx2:#777777;--tx3:#AAAAAA;
  --bd:rgba(0,0,0,0.06);--bd2:rgba(0,0,0,0.13);
  --r:16px;--r-sm:11px;
  --ac:#4A7FA5;--ac-bg:#EEF4F9;--ac-tx:#2D5C7E;
  --green:#3A7D52;--gbg:#EBF5EF;--gm:#4A9E68;
  --red:#A8382A;--rbg:#FAEEED;--rm:#D05444;
  --amber:#8C6200;--abg:#FBF4E6;--am:#C08820;
  --shadow:0 1px 6px rgba(0,0,0,0.05);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.04);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
}
html[data-mode=dark]{
  --bg:#181818;--sur:#232323;--sur2:#2C2C2C;--sur3:#363636;
  --tx:#E8E8E8;--tx2:#909090;--tx3:#606060;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.14);
  --green:#5BBD7C;--gbg:#102A1A;--gm:#4A9E68;
  --red:#E07060;--rbg:#2A1010;--rm:#D05444;
  --amber:#E8A830;--abg:#221A00;--am:#C08820;
  --shadow:none;--shadow-sm:none;
}

body{font-family:var(--font);background:var(--bg);min-height:100vh;color:var(--tx);transition:background .25s,color .25s;-webkit-font-smoothing:antialiased;}

/* ── layout ── */
.app{max-width:500px;margin:0 auto;padding:16px 18px 90px;}

/* ── cards ── */
.card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);}
.card-sm{padding:14px 18px;}
.card-flat{background:var(--sur2);border:none;border-radius:var(--r-sm);padding:14px 16px;margin-bottom:10px;}

/* ── section label ── */
.sec{font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:.07em;text-transform:uppercase;margin:22px 0 10px;padding-left:1px;}

/* ── header ── */
.hdr{text-align:center;padding:22px 0 10px;}
.hdr h1{font-size:24px;font-weight:700;color:var(--tx);letter-spacing:-.5px;line-height:1;}
.hdr-tagline{font-size:13px;color:var(--tx3);margin-top:4px;font-weight:500;}
.hdr-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
.pill{font-size:12px;padding:5px 13px;border-radius:99px;cursor:pointer;font-weight:600;border:none;font-family:var(--font);letter-spacing:.01em;transition:all .15s;}
.pill:hover{opacity:.85;}
.mode-btn{background:var(--sur2);border:1px solid var(--bd);border-radius:99px;padding:5px 11px;font-size:14px;cursor:pointer;color:var(--tx2);transition:background .15s;}
.mode-btn:hover{background:var(--sur3);}

/* ── nav: three rows, icon + label, scrollable ── */
.nav-wrap{margin-bottom:18px;}
.nav-row-1,.nav-row-2,.nav-row-3{
  display:flex;gap:4px;margin-bottom:4px;
  overflow-x:auto;padding-bottom:2px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.nav-row-1::-webkit-scrollbar,
.nav-row-2::-webkit-scrollbar,
.nav-row-3::-webkit-scrollbar{display:none;}
/* row 1 + 2: 6 tabs each — fit exactly, no scroll needed */
.nav-row-1 .nt,.nav-row-2 .nt{flex:1;min-width:0;}
/* row 3: 8 tabs — scroll on small screens */
.nav-row-3 .nt{flex:0 0 auto;min-width:60px;}
.nt{padding:10px 6px 8px;font-size:10px;font-weight:500;background:transparent;border:1px solid transparent;cursor:pointer;border-radius:var(--r-sm);color:var(--tx3);font-family:var(--font);white-space:nowrap;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;line-height:1.2;}
.nt-icon{font-size:22px;line-height:1;}
.nt:hover{background:var(--sur2);color:var(--tx2);}
.nt.on{background:var(--sur);color:var(--tx);font-weight:600;border-color:var(--bd2);box-shadow:var(--shadow-sm);}
.nt-danger{color:var(--rm)!important;}
.nt-danger.on{background:var(--rbg)!important;color:var(--red)!important;}

/* ── custom categories ── */
.cat-edit-row{display:flex;align-items:center;gap:8px;background:var(--sur2);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.cat-emoji-btn{font-size:20px;width:38px;height:38px;border-radius:9px;border:1px solid var(--bd);background:var(--sur);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cat-color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:border-color .15s;}
.cat-color-dot.sel{border-color:var(--tx);}
/* ── CSV import ── */
.csv-drop{border:2px dashed var(--bd2);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:10px;}
.csv-drop:hover,.csv-drop.drag{border-color:var(--ac);background:var(--ac-bg);}
/* ── running balance ── */
.bal-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--bd);font-size:13px;}
.bal-row:first-child{border-top:none;}
.bal-amt{font-weight:700;text-align:right;min-width:70px;}
.bal-running{text-align:right;min-width:70px;font-size:12px;}
/* ── scheduled tx ── */
.sched-item{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--bd);}
.sched-item:first-child{border-top:none;}
.days-chip{font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;white-space:nowrap;}
/* ── debt payoff ── */
.debt-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:12px;}
.method-btn{flex:1;padding:10px 6px;border-radius:10px;border:1px solid var(--bd);background:var(--sur2);font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;}
.method-btn.on{background:var(--ac-bg);color:var(--ac-tx);border-color:var(--ac-tx);font-weight:700;}
/* ── receipt scanner ── */
.scan-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--sur2);border:1.5px dashed var(--bd2);border-radius:var(--r-sm);padding:13px;font-size:13px;font-weight:600;color:var(--tx2);cursor:pointer;font-family:var(--font);transition:all .2s;margin-bottom:10px;}
.scan-btn:hover{background:var(--ac-bg);border-color:var(--ac);color:var(--ac-tx);}
.scan-preview{width:100%;max-height:180px;object-fit:cover;border-radius:10px;margin-bottom:10px;display:block;}
.scan-processing{display:flex;align-items:center;justify-content:center;gap:10px;padding:20px;color:var(--tx2);font-size:14px;}
.scan-spinner{width:20px;height:20px;border:2px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.scan-result{background:var(--gbg);border:1px solid var(--gm)30;border-radius:10px;padding:11px 13px;margin-bottom:10px;font-size:12px;color:var(--green);}

/* ── retirement sliders ── */
.ret-slider{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:99px;background:var(--sur3);outline:none;cursor:pointer;}
.ret-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:var(--ac);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.15);}
.ret-slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--ac);cursor:pointer;border:none;}

/* ── quick-log floating button ── */
.quick-log-fab{position:fixed;bottom:24px;right:20px;width:58px;height:58px;border-radius:50%;background:var(--ac);border:none;box-shadow:0 4px 18px rgba(0,0,0,0.18);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;z-index:50;transition:transform .15s,box-shadow .15s;}
.quick-log-fab:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(0,0,0,0.22);}
.quick-log-fab:active{transform:scale(0.96);}

/* ── win celebration ── */
.win-card{border-radius:var(--r);padding:16px 18px;margin-bottom:14px;text-align:center;animation:winpop .4s cubic-bezier(.17,.67,.35,1.3);}
@keyframes winpop{0%{transform:scale(.92);opacity:0}100%{transform:scale(1);opacity:1}}

/* ── focus mode ── */
.focus-banner{display:flex;align-items:center;justify-content:space-between;background:var(--ac-bg);border:1.5px solid var(--ac);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:12px;}

/* ── spending weather ── */
.weather-card{border-radius:var(--r);padding:20px;text-align:center;margin-bottom:14px;}
.weather-icon{font-size:52px;line-height:1;margin-bottom:8px;}
.weather-label{font-size:13px;font-weight:600;letter-spacing:.03em;}

/* ── quick reminder bell ── */
.tab-bell{background:none;border:1px solid var(--bd);border-radius:99px;padding:5px 10px;font-size:14px;cursor:pointer;color:var(--tx3);transition:all .2s;display:inline-flex;align-items:center;gap:5px;font-family:var(--font);font-size:12px;font-weight:500;}
.tab-bell:hover{background:var(--sur2);color:var(--tx);}
.tab-bell.active{background:var(--abg);border-color:var(--am);color:var(--amber);}
.qrem-sheet{background:var(--sur);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;border:1.5px solid var(--am);box-shadow:var(--shadow);}
.qrem-freq-row{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;}
.qrem-freq-btn{padding:7px 12px;border-radius:99px;border:1px solid var(--bd2);background:var(--sur2);font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;font-family:var(--font);transition:all .15s;}
.qrem-freq-btn.on{background:var(--abg);color:var(--amber);border-color:var(--am);font-weight:700;}

/* ── split transactions ── */
.split-row{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding:8px 10px;background:var(--sur);border:1px solid var(--bd);border-radius:10px;}
.split-total-bar{height:6px;border-radius:99px;background:var(--sur2);overflow:hidden;margin-top:4px;}
.split-fill{height:100%;border-radius:99px;transition:width .3s;}

/* ── annual budget ── */
.annual-month-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;}
.annual-month-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:pointer;}
.annual-bar-wrap{margin-top:6px;}
.annual-cat-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.annual-cat-label{font-size:11px;color:var(--tx2);width:90px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.annual-summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.annual-kpi{background:var(--sur2);border-radius:12px;padding:14px 10px;text-align:center;}
.annual-kpi-val{font-size:17px;font-weight:700;}
.annual-kpi-lbl{font-size:10px;color:var(--tx2);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}

/* ── alert badge ── */
.alert-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--rm);margin-left:4px;vertical-align:middle;}

/* ── colour picker ── */
.color-grid{display:flex;gap:7px;flex-wrap:wrap;padding:4px 0;}
.cpick{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .12s;}
.cpick.sel{border-color:var(--tx);transform:scale(1.15);}

/* ── reminders ── */
.rem-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;}
.rem-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.rem-row:last-child{margin-bottom:0;}
.tog{position:relative;width:42px;height:24px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-sl{position:absolute;inset:0;border-radius:99px;background:var(--sur3);border:1px solid var(--bd2);cursor:pointer;transition:.2s;}
.tog-sl:before{content:'';position:absolute;width:18px;height:18px;left:2px;top:2px;border-radius:50%;background:var(--tx3);transition:.2s;}
.tog input:checked+.tog-sl{background:var(--ac);border-color:var(--ac);}
.tog input:checked+.tog-sl:before{transform:translateX(18px);background:#fff;}
.freq-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;}
.freq-btn{padding:9px 6px;border-radius:9px;border:1px solid var(--bd);background:var(--sur2);font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;}
.freq-btn.on{background:var(--ac-bg);color:var(--ac-tx);border-color:var(--ac-tx);font-weight:700;}
.tab-check-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;}
.tab-chk{display:flex;align-items:center;gap:7px;background:var(--sur2);border:1px solid var(--bd);border-radius:9px;padding:8px 10px;cursor:pointer;}
.tab-chk.on{background:var(--ac-bg);border-color:var(--ac-tx);}
.tab-chk span{font-size:12px;font-weight:500;color:var(--tx2);}
.tab-chk.on span{color:var(--ac-tx);font-weight:700;}
.notif-banner{border-radius:11px;padding:11px 13px;margin-bottom:10px;font-size:13px;line-height:1.5;}

/* ── ring ── */
.ring-wrap{display:flex;flex-direction:column;align-items:center;}
.ring-c{position:relative;width:148px;height:148px;margin-bottom:14px;}
.ring-svg{width:148px;height:148px;transform:rotate(-90deg);}
.r-bg{fill:none;stroke:var(--sur2);stroke-width:12;}
.r-fill{fill:none;stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1);}
.ring-mid{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}

/* ── chips ── */
.chips{display:flex;gap:9px;}
.chip{flex:1;background:var(--sur2);border-radius:14px;padding:13px 8px;text-align:center;}
.chip-v{font-size:14px;font-weight:600;}
.chip-l{font-size:10px;color:var(--tx3);margin-top:3px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;}

/* ── progress ── */
.pb{height:8px;background:var(--sur2);border-radius:99px;overflow:hidden;}
.pf{height:100%;border-radius:99px;transition:width .55s cubic-bezier(.4,0,.2,1);}
.pb-sm{height:5px;background:var(--sur2);border-radius:99px;overflow:hidden;margin-top:5px;}
.pf-sm{height:100%;border-radius:99px;}

/* ── tx items ── */
.tx-item{display:flex;align-items:flex-start;gap:10px;padding:13px 0;border-top:1px solid var(--bd);}
.tx-item:first-child{border-top:none;}
.tx-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.tx-del{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:13px;padding:3px 7px;border-radius:7px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.tx-edit{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:13px;padding:3px 7px;border-radius:7px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.tx-item:hover .tx-del,.tx-item:hover .tx-edit{opacity:1;}
/* On mobile always show edit/delete since hover doesn't exist */
@media (hover:none){.tx-del,.tx-edit{opacity:.55;}}

/* ── modal ── */
.mbk{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
.mod{background:var(--sur);border-radius:20px 20px 0 0;padding:26px 22px 44px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.mod h2{font-size:18px;font-weight:600;color:var(--tx);margin-bottom:18px;}
.mrow{display:flex;align-items:center;gap:10px;margin-bottom:13px;}
.mrow label{font-size:13px;color:var(--tx2);width:86px;flex-shrink:0;font-weight:600;}
.mrow input,.mrow select,.mrow textarea{flex:1;background:var(--sur2);border:1px solid var(--bd2);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--tx);outline:none;font-family:var(--font);transition:border-color .2s;}
.mrow input:focus,.mrow select:focus,.mrow textarea:focus{border-color:var(--ac);background:var(--sur);}
.mrow textarea{resize:vertical;min-height:64px;font-size:13px;}
.macts{display:flex;gap:10px;margin-top:20px;}
.btn-c{flex:1;background:var(--sur2);border:1px solid var(--bd2);border-radius:11px;padding:13px;font-size:14px;font-weight:500;cursor:pointer;color:var(--tx2);font-family:var(--font);transition:all .2s;}
.btn-c:hover{background:var(--sur3);}
.btn-ok{flex:2;border:none;border-radius:11px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;color:#fff;font-family:var(--font);transition:opacity .2s;}
.btn-ok:hover{opacity:.88;}

/* ── settings rows ── */
.srow{display:flex;align-items:center;gap:10px;background:var(--sur2);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.srow span{flex:1;font-size:14px;color:var(--tx);font-weight:500;}
.srow input[type=number],.srow select{width:100px;background:var(--sur);border:1.5px solid var(--bd);border-radius:10px;padding:8px 11px;font-size:14px;color:var(--tx);text-align:right;font-family:var(--font);outline:none;}

/* ── add button ── */
.add-btn{width:100%;background:transparent;border:1.5px dashed var(--bd2);border-radius:var(--r-sm);padding:14px;font-size:13px;font-weight:500;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:11px;font-family:var(--font);transition:all .2s;}
.add-btn:hover{background:var(--sur2);color:var(--tx2);border-color:var(--bd2);border-style:dashed;}

/* ── tip boxes ── */
.tip{border-radius:var(--r-sm);padding:14px 16px;margin-bottom:14px;font-size:13px;line-height:1.65;font-weight:400;}

/* ── empty state ── */
.empty{text-align:center;padding:48px 20px;color:var(--tx3);font-size:14px;line-height:1.9;font-weight:400;}

/* ── theme dots ── */
.th-dot{width:34px;height:34px;border-radius:10px;cursor:pointer;border:3px solid transparent;transition:all .15s;display:inline-block;}
.th-dot.sel{border-color:var(--tx);transform:scale(1.12);}

/* ── filter pills ── */
.f-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
.f-row::-webkit-scrollbar{display:none;}
.fp{background:var(--sur2);border:1px solid var(--bd2);border-radius:99px;padding:7px 14px;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s;}
.fp.on{background:var(--ac-bg);color:var(--ac-tx);border-color:var(--ac);}

/* ── badges ── */
.auto-b{font-size:9px;background:var(--sur2);color:var(--tx3);padding:2px 7px;border-radius:99px;margin-left:5px;font-weight:700;letter-spacing:.04em;}

/* ── search ── */
.srch{display:flex;align-items:center;background:var(--sur2);border:1px solid var(--bd2);border-radius:12px;padding:0 14px;margin-bottom:13px;gap:8px;transition:border-color .2s;}
.srch:focus-within{border-color:var(--ac);}
.srch input{flex:1;background:none;border:none;padding:13px 0;font-size:14px;color:var(--tx);outline:none;font-family:var(--font);}

/* ── toast ── */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1C1917;color:#F2EFE8;padding:12px 24px;border-radius:99px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.22);letter-spacing:.01em;}
html[data-mode=dark] #toast{background:#F2EFE8;color:#1C1917;}
#toast.show{opacity:1;}

/* ── emotion tags ── */
.emo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.emo-btn{background:var(--sur2);border:1px solid var(--bd2);border-radius:99px;padding:7px 13px;font-size:13px;cursor:pointer;font-family:var(--font);transition:all .2s;}
.emo-btn:hover{background:var(--sur3);}

const FB_S=[[0,10,0],[11600,12,11600],[47150,22,47150],[100525,24,100525],[191950,32,191950],[243725,35,243725],[609350,37,609350]];
const FB_M=[[0,10,0],[23200,12,23200],[94300,22,94300],[201050,24,201050],[383900,32,383900],[487450,35,487450],[731200,37,731200]];
const FB_H=[[0,10,0],[16550,12,16550],[63100,22,63100],[100500,24,100500],[191950,32,191950],[243700,35,243700],[609350,37,609350]];
const SD_TAX={single:14600,married:29200,hoh:21900};
function bracketTax(inc,bk){let t=0;for(let i=bk.length-1;i>=0;i--){const[f,r]=bk[i];if(inc>f){t+=(inc-f)*(r/100);inc=f;}}return t;}
function dedAmt(d, gross){
  /* Per-paycheck dollar amount: flat $ or % of gross */
  if(d.pctMode&&+d.pct>0) return gross*(+d.pct)/100;
  return +d.amt||0;
}

function calcPay(gross,freq,state,filing,pre=[],post=[]){
  const n={weekly:52,biweekly:26,semimonthly:24,monthly:12,every_mon:52,every_tue:52,every_wed:52,every_thu:52,every_fri:52}[freq]||26;
  const ag=gross*n,apt=(pre||[]).reduce((s,d)=>s+dedAmt(d,gross)*n,0),apost=(post||[]).reduce((s,d)=>s+dedAmt(d,gross)*n,0);
  const sd=SD_TAX[filing]||SD_TAX.single,ti=Math.max(0,ag-apt-sd);
  const fb=filing==='married'?FB_M:filing==='hoh'?FB_H:FB_S;
  const fed=bracketTax(ti,fb),ss=Math.min(ag,168600)*0.062;
  const med=ag<=200000?ag*0.0145:200000*0.0145+(ag-200000)*0.0235;
  const st=bracketTax(ti,(STATE_TAX[state]||{b:[[0,0,0]]}).b);
  return{ag,net:ag-fed-ss-med-st-apt-apost,fed,ss,med,st,n,apt,apost};

/* ══════════════════════════════════════════════════
   STORAGE — IndexedDB primary (50-500MB), localStorage backup (5MB)
   Existing data migrates automatically on first load.
══════════════════════════════════════════════════ */
const PI='bb_idx', PD=id=>'bb_p_'+id, PA='bb_active';
const DB_NAME='nudge_db', DB_VER=1, DB_STORE='profiles';

/* ── IndexedDB async engine ── */
let _db=null;
const _cache={};

function _openDB(){
  return new Promise((res,rej)=>{
    if(_db){res(_db);return;}
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(DB_STORE))
        db.createObjectStore(DB_STORE,{keyPath:'key'});
    };
    req.onsuccess=e=>{_db=e.target.result;res(_db);};
    req.onerror=e=>{console.error('IDB open failed',e);rej(e);};
  });
}

function _idbGet(key){
  return _openDB().then(db=>new Promise((res,rej)=>{
    const req=db.transaction(DB_STORE,'readonly').objectStore(DB_STORE).get(key);
    req.onsuccess=()=>res(req.result?.value??null);
    req.onerror=()=>rej(req.error);
  })).catch(()=>null);
}

function _idbSet(key,value){
  return _openDB().then(db=>new Promise((res,rej)=>{
    const req=db.transaction(DB_STORE,'readwrite').objectStore(DB_STORE).put({key,value});
    req.onsuccess=()=>res(true);
    req.onerror=()=>rej(req.error);
  })).catch(e=>{console.error('IDB set failed',key,e);return false;});
}

function _idbDel(key){
  return _openDB().then(db=>new Promise((res,rej)=>{
    const req=db.transaction(DB_STORE,'readwrite').objectStore(DB_STORE).delete(key);
    req.onsuccess=()=>res(true);
    req.onerror=()=>rej(req.error);
  })).catch(()=>false);
}

/* ── Sync API (wraps async IDB with a local cache) ── */
const getIdx=()=>{
  if(_cache[PI]!==undefined)return _cache[PI];
  try{const d=localStorage.getItem(PI);const v=d?JSON.parse(d):[];_cache[PI]=v;return v;}
  catch{return[];}
};

const setIdx=a=>{
  _cache[PI]=a;
  try{localStorage.setItem(PI,JSON.stringify(a));}catch(e){}
  _idbSet(PI,a);
};

const getPD=id=>{
  const k=PD(id);
  if(_cache[k]!==undefined)return _cache[k];
  try{const d=localStorage.getItem(k);const v=d?JSON.parse(d):null;if(v)_cache[k]=v;return v;}
  catch{return null;}
};

const setPD=(id,d)=>{
  const k=PD(id);
  _cache[k]=d;
  /* Write to IDB (primary — large storage) */
  _idbSet(k,d).then(ok=>{
    if(!ok&&typeof toast==='function')
      toast('⚠ Save failed — check device storage');
  });
  /* Also write to localStorage as backup */
  try{localStorage.setItem(k,JSON.stringify(d));}
  catch(e){/* localStorage full — IDB is primary anyway */}
};

const delPD=id=>{
  const k=PD(id);
  delete _cache[k];
  try{localStorage.removeItem(k);}catch(e){}
  _idbDel(k);
};

const getActive=()=>{try{return localStorage.getItem(PA)||null;}catch{return null;}};
const setActive=id=>{
  try{localStorage.setItem(PA,id);}catch(e){}
  _idbSet(PA,id);
};

/* ── Startup: migrate localStorage → IDB, then load IDB into cache ── */
function _startupIDB(){
  _openDB().then(async()=>{
    /* Step 1: migrate localStorage data into IDB once */
    const migrated=await _idbGet('idb_migrated_v1');
    if(!migrated){
      const keys=Object.keys(localStorage).filter(k=>k.startsWith('bb_'));
      for(const k of keys){
        try{
          const raw=localStorage.getItem(k);
          if(raw){await _idbSet(k,JSON.parse(raw));_cache[k]=JSON.parse(raw);}
        }catch(e){}
      }
      await _idbSet('idb_migrated_v1',true);
      console.log('Nudge: migrated',keys.length,'keys to IndexedDB');
    }

    /* Step 2: load active profile from IDB into cache + re-apply to S */
    const active=getActive();
    if(active){
      const d=await _idbGet(PD(active));
      if(d){
        _cache[PD(active)]=d;
        /* Sync back to localStorage as insurance */
        try{localStorage.setItem(PD(active),JSON.stringify(d));}catch(e){}
        /* Re-apply to live state */
        Object.assign(S,d);
        applyLoadGuards();
        render();
      }
    }

    /* Step 3: load profile index from IDB */
    const idx=await _idbGet(PI);
    if(idx&&idx.length){
      _cache[PI]=idx;
      try{localStorage.setItem(PI,JSON.stringify(idx));}catch(e){}
    }

  }).catch(e=>console.error('IDB startup failed:',e));
}

function applyLoadGuards(){
  if(!S.netWorth)S.netWorth={assets:[],debts:[]};

  if(!S.paycheck.preTax)S.paycheck.preTax=[];

  /* Migrate category budgets */

/* ══ AUTO-POST ENGINE ══
   Checks every recurring bill AND recurring income source against
   today's date and posts transactions/income automatically at the
   correct interval. Runs on every render() call — safe to call many
   times because it checks for duplicates before posting.          ══ */

const AUTO_FREQS={
  weekly:      {days:7,   label:'Weekly'},
  biweekly:    {days:14,  label:'Every 2 weeks'},
  semimonthly: {days:null,label:'Twice a month'},   /* 1st and 15th */
  monthly:     {days:null,label:'Monthly'},
  bimonthly:   {days:null,label:'Every 2 months'},
  quarterly:   {days:null,label:'Quarterly'},
  annually:    {days:null,label:'Annually'},
  /* weekday-based pay — every Mon/Tue/Wed/Thu/Fri */
  every_mon:   {days:7,   label:'Every Monday'},
  every_tue:   {days:7,   label:'Every Tuesday'},
  every_wed:   {days:7,   label:'Every Wednesday'},
  every_thu:   {days:7,   label:'Every Thursday'},
  every_fri:   {days:7,   label:'Every Friday'},
};

function autoPostKey(id,date){
  /* unique key per source per occurrence date */
  return 'ap_'+id+'_'+date.getFullYear()+'_'+date.getMonth()+'_'+date.getDate();
}

function shouldPostToday(freq,startDate,dueDay){
  /* Returns true if today is a posting day for this frequency */
  const today=now;
  const start=startDate?new Date(startDate):new Date(today.getFullYear(),today.getMonth(),1);
  const d=today.getDate(),m=today.getMonth(),y=today.getFullYear();
  const due=+dueDay||1;

  switch(freq){
    case 'weekly':{
      /* post on same day-of-week as startDate */
      const startDow=start.getDay();
      return today.getDay()===startDow;
    }
    case 'biweekly':{
      const diffDays=Math.round((today-start)/(1000*60*60*24));
      return diffDays>=0&&diffDays%14===0;
    }
    case 'semimonthly':
      return d===1||d===15;
    case 'monthly':
      return d===due;
    case 'bimonthly':
      return d===due&&m%2===0;
    case 'quarterly':
      return d===due&&[0,3,6,9].includes(m);
    case 'annually':
      return d===due&&m===start.getMonth();
    case 'every_mon': return today.getDay()===1;
    case 'every_tue': return today.getDay()===2;
    case 'every_wed': return today.getDay()===3;
    case 'every_thu': return today.getDay()===4;
    case 'every_fri': return today.getDay()===5;
    default:
      return d===due; /* fallback: monthly */
  }
}

function applyRecurring(){
  if(!S.transactions)S.transactions=[];
  const postedKeys=new Set(S.transactions.filter(t=>t.autoKey).map(t=>t.autoKey));

  /* ── AUTO-POST BILLS ── */
  (S.recurring||[]).forEach(r=>{
    const freq=r.freq||'monthly';
    const due=r.dueDay||1;
    if(!shouldPostToday(freq,r.startDate,due))return;

    const key=autoPostKey(r.id,now);
    if(postedKeys.has(key))return; /* already posted today */

    S.transactions.push({
      id:'rc_'+r.id+'_'+now.getTime(),
      recurId:r.id,autoKey:key,
      name:r.name,amount:r.amount,catId:r.catId,
      month:now.getMonth(),year:now.getFullYear(),day:now.getDate(),
      auto:true,note:'Auto-posted · '+AUTO_FREQS[freq]?.label||freq,emotion:''
    });
    postedKeys.add(key);
  });

  /* ── AUTO-POST INCOME SOURCES ── */
  if(!S.incomeHistory)S.incomeHistory=[];
  const postedIncomeKeys=new Set(S.incomeHistory.map(e=>e.autoKey));

  (S.incomeSources||[]).forEach(src=>{
    if(!src.autoPost)return; /* only auto-post if enabled */
    const freq=src.freq||'monthly';
    const due=src.dueDay||1;
    if(!shouldPostToday(freq,src.startDate,due))return;

    const key=autoPostKey('inc_'+src.id,now);
    if(postedIncomeKeys.has(key))return;

    S.incomeHistory.push({
      id:'inc_'+src.id+'_'+now.getTime(),
      sourceId:src.id,autoKey:key,
      name:src.name,amount:src.amount||src.monthly||0,
      month:now.getMonth(),year:now.getFullYear(),day:now.getDate(),
      note:'Auto-posted income · '+AUTO_FREQS[freq]?.label||freq,
    });
    postedIncomeKeys.add(key);
  });
}

/* ══════════════════════════════════════════════════
   STABLE INPUT SYSTEM — v3
   
   Core insight: render() destroys every input by
   replacing innerHTML. The only safe time to call
   render() while an input is focused is NEVER.
   
   Strategy:
   - oninput  → update state immediately, NO render
   - onblur   → update state, save, schedule a
                deferred render AFTER the browser has
                finished its blur/focus cycle (16ms)
   - liveVal  → always returns state value (render
                only happens when no input is active)
══════════════════════════════════════════════════ */
let _liveId = null;
const _timers = {};

function liveInput(id, updateFn) {
  _liveId = id;
  updateFn();         /* update state immediately */
  clearTimeout(_timers[id]);
  /* No render here — state is updated, display will
     sync on the next natural render (blur or action) */
}

function blurInput(id, updateFn) {
  if (_liveId === id) _liveId = null;
  clearTimeout(_timers[id]);
  updateFn();   /* final state sync */
  save();
  /* Skip render if a modal is open */
  if (S.modal) return;
  /* Skip render if user tabbed to another input field —
     avoids destroying focus when moving between deduction
     name → amount, or any other adjacent input fields */
  setTimeout(() => {
    const next = document.activeElement;
    if (next && (next.tagName === 'INPUT' || next.tagName === 'TEXTAREA' || next.tagName === 'SELECT')) {
      return; /* user moved to another field — let it be */
    }
    render();
  }, 16);
}

/* liveVal: since render() only runs after blur now,
   _liveId will always be null during render.
   Just return the state value directly. */
function liveVal(id, stateVal) {
  return stateVal ?? '';
}

/* debounceRender — legacy shim, still used in some places */
function debounceRender(key, fn, delay=400){
  fn();
  clearTimeout(_timers[key]);
  _timers[key]=setTimeout(()=>render(), delay);
}

const _remTimers={};

function startReminder(rem){
  stopReminder(rem.id);
  if(!rem.enabled||!rem.freq||!rem.tabs||!rem.tabs.length) return;
  const freq=FREQ_OPTIONS.find(f=>f.id===rem.freq);
  if(!freq) return;
  _remTimers[rem.id]=setInterval(()=>fireReminder(rem),freq.ms);
}

}

  try{
    if(navigator.vibrate){
      const pattern=rem.vibPattern||'single';
      if(pattern==='single')   navigator.vibrate([200]);
      else if(pattern==='double') navigator.vibrate([150,80,150]);
      else if(pattern==='triple') navigator.vibrate([100,60,100,60,100]);
      else if(pattern==='long')   navigator.vibrate([500]);
    }
  }catch(e){}

  /* browser notification */
  const tab=REM_TABS.find(t=>rem.tabs&&rem.tabs[0]===t.id)||REM_TABS[0];
  const msgs=[
    'Time to check in with your money 💰',
    'Quick nudge — how are your finances doing?',
    'A gentle reminder to log your spending 📝',
    'Your budget is waiting for you!',
    "Check in with Nudge 🧠",
    'Money check-in time — you got this ✓',
  ];
  const msg=msgs[Math.floor(Math.random()*msgs.length)];
  if(Notification&&Notification.permission==='granted'){
    try{
      new Notification('Nudge — '+tab.emoji+' '+tab.label,{
        body:msg,
        icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="%231D9E75"/><text x="32" y="44" font-size="36" text-anchor="middle" fill="white">n</text></svg>',
        badge:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="%231D9E75"/></svg>',
        tag:'nudge-'+rem.id,
        renotify:true,
        silent:false,
      });
    }catch(e){}
  }

  /* in-app toast nudge */
  toast(tab.emoji+' '+rem.label+' reminder: '+msg.split('—')[0].trim());

  /* Send push notification for background/closed app delivery */

    'Nudge '+tab.emoji+' '+tab.label,

}

/* ── CARRY-OVER BUDGETS ── */
function getCarryover(catId,month,year){
  const key=catId+'_'+year+'_'+month;
  return S.carryover?.[key]||0;
}
function calcCarryover(catId,month,year){
  /* how much was left over last month for this category */
  const pm=month===0?11:month-1,py=month===0?year-1:year;
  const cat=S.categories.find(c=>c.id===catId);if(!cat)return 0;
  const lastSpent=(S.transactions||[]).filter(t=>t.catId===catId&&t.month===pm&&t.year===py).reduce((a,t)=>a+(+t.amount||0),0);
  const lastBudget=(cat.budget||0)+getCarryover(catId,pm,py);
  return Math.max(0,lastBudget-lastSpent);
}
function applyCarryovers(){
  /* called once per month on first render of new month */
  const key='co_applied_'+S.year+'_'+S.month;
  if(S.carryover?.[key])return;
  if(!S.carryover)S.carryover={};
  S.categories.forEach(cat=>{
    if(cat.carryoverEnabled){
      const amt=calcCarryover(cat.id,S.month,S.year);
      if(amt>0){
        const k=cat.id+'_'+S.year+'_'+S.month;
        S.carryover[k]=amt;
      }
    }
  });
  S.carryover[key]=true;
  save();
}

/* ── CATEGORY BUDGET WITH CARRYOVER ── */
function catBudgetTotal(catId){
  const cat=S.categories.find(c=>c.id===catId);if(!cat)return 0;
  return (cat.budget||0)+(cat.carryoverEnabled?getCarryover(catId,S.month,S.year):0);
}

  return sorted.map(tx=>({...tx,runningBal:(bal-=(+tx.amount||0))}));

/* ── CSV IMPORT ── */
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return{rows:[],headers:[]};
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  const rows=lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(const ch of line){
      if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=ch;
    }
    vals.push(cur.trim());
    const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||'');
    return obj;
  });
  return{rows,headers};
}

function guessCSVFields(headers){
  const find=(keys)=>headers.find(h=>keys.some(k=>h.includes(k)))||null;
  return{
    date: find(['date','time','when','posted']),
    desc: find(['desc','description','memo','name','merchant','payee','transaction']),
    amount: find(['amount','debit','credit','sum','charge','payment']),
    debit:  find(['debit','withdrawal','charge']),
    credit: find(['credit','deposit','payment']),
  };
}

function importCSVRows(rows,mapping,catId){
  if(!S.transactions)S.transactions=[];
  let count=0;
  rows.forEach(row=>{
    const dateStr=row[mapping.date]||'';
    const desc=(row[mapping.desc]||'Unknown').replace(/"/g,'').trim();
    let amt=0;
    if(mapping.debit&&mapping.credit){
      const deb=parseFloat((row[mapping.debit]||'0').replace(/[,$]/g,''));
      const cred=parseFloat((row[mapping.credit]||'0').replace(/[,$]/g,''));
      amt=Math.abs(deb||0)||Math.abs(cred||0);
    } else {
      amt=Math.abs(parseFloat((row[mapping.amount]||'0').replace(/[,$()-]/g,'')));
    }
    if(!amt||!desc)return;
    const d=new Date(dateStr);
    const month=isNaN(d)?now.getMonth():d.getMonth();
    const year=isNaN(d)?now.getFullYear():d.getFullYear();
    const day=isNaN(d)?now.getDate():d.getDate();
    /* dedup: skip if identical name+amount+date already exists as a CSV import */
    const isDup=(S.transactions||[]).some(t=>
      t.name===desc&&Math.abs((+t.amount||0)-amt)<0.01&&
      t.month===month&&t.year===year&&t.day===day&&t.note==='Imported'
    );
    if(isDup)return;
    S.transactions.push({
      id:'csv_'+Date.now().toString(36)+Math.random().toString(36).slice(2),
      name:desc,amount:amt,catId:catId||'other',
      month,year,day,auto:false,note:'Imported',emotion:'',
    });
    count++;
  });
  save();toast(count+' transactions imported ✓');
  return count;
}

/* ── DEBT PAYOFF ── */
function calcDebtPayoff(debts,method,extraMonthly){
  if(!debts.length)return[];
  let working=debts.map(d=>({...d,balance:+d.value||0,rate:+d.rate||0,minPay:+d.minPay||Math.max(25,((+d.value||0)*0.02)),months:0,totalInterest:0}));
  /* sort by method */
  if(method==='avalanche')working.sort((a,b)=>b.rate-a.rate);
  else working.sort((a,b)=>a.balance-b.balance); /* snowball */

  const MAX_MONTHS=360;
  for(let m=0;m<MAX_MONTHS;m++){
    let extra=extraMonthly||0;
    working.forEach((d,i)=>{
      if(d.balance<=0)return;
      const interest=d.balance*(d.rate/100/12);
      d.totalInterest+=interest;
      d.balance+=interest;
      const pay=Math.min(d.balance,d.minPay+(i===0?extra:0));
      d.balance=Math.max(0,d.balance-pay);
      if(i===0)extra=0;
      if(d.balance===0&&!d.months)d.months=m+1;
    });
    if(working.every(d=>d.balance<=0))break;
  }
  return working;
}

/* ══════════════════════════════════════════════════
   ACCOUNT BALANCE ENGINE
══════════════════════════════════════════════════ */

function acctBalance(acct){
  /* true running balance = opening + all ledger entries */
  const base = +acct.openingBalance || 0;
  return base + (acct.ledger||[]).reduce((a,e)=>a+(+e.amount||0), 0);
}

function acctAutoSync(acct){
  /* Called once per day per account. Posts:
     - Income credits on pay days
     - Bill debits on due days
     Returns array of new entries posted */
  if(!acct.autoSync) return [];
  const posted = new Set((acct.ledger||[]).map(e=>e.autoKey).filter(Boolean));
  const newEntries = [];
  const today = now;
  const todayKey = today.getFullYear()+'_'+today.getMonth()+'_'+today.getDate();

  /* Income credits */
  (S.incomeSources||[]).forEach(src=>{
    if(!src.autoPost) return;
    const key = 'inc_'+src.id+'_'+todayKey;
    if(posted.has(key)) return;
    if(!shouldPostToday(src.freq||'monthly', src.startDate, src.dueDay||1)) return;
    newEntries.push({
      id:'ae_'+Date.now().toString(36)+Math.random().toString(36).slice(2),
      autoKey:key, type:'credit',
      label:(src.name||'Income')+' — payday',
      amount:+(src.amount||src.monthly||0),
      date:today.toISOString().split('T')[0],
      ts:Date.now(),
    });
  });

  /* Bill debits */
  (S.recurring||[]).forEach(bill=>{
    if(!bill.amount) return;
    const key = 'bill_'+bill.id+'_'+todayKey;
    if(posted.has(key)) return;
    if(!shouldPostToday(bill.freq||'monthly', bill.startDate, bill.dueDay||1)) return;
    newEntries.push({
      id:'ae_'+Date.now().toString(36)+Math.random().toString(36).slice(2),
      autoKey:key, type:'debit',
      label:bill.name||'Bill',
      amount:-(+bill.amount),
      date:today.toISOString().split('T')[0],
      ts:Date.now(),
    });
  });

  return newEntries;
}

function runAccountSync(){
  /* Run auto-sync for all accounts with autoSync enabled */
  if(!S.accounts||!S.accounts.length) return;
  let changed = false;
  S.accounts.forEach(acct=>{
    const entries = acctAutoSync(acct);
    if(entries.length){
      if(!acct.ledger) acct.ledger=[];
      acct.ledger.push(...entries);
      changed = true;
    }
  });
  if(changed) save();
}

/* ══════════════════════════════════════════════════
   FOCUS PRESERVATION — protects ALL inputs from
   being wiped by render()'s innerHTML replacement
══════════════════════════════════════════════════ */
function _captureFocus(){
  const el = document.activeElement;
  if(!el || (el.tagName!=='INPUT' && el.tagName!=='TEXTAREA')) return null;
  /* Assign a synthetic id if none exists so we can find it after render */
  if(!el.id) el.id = '_fc_' + Date.now();
  return {
    id:    el.id,
    value: el.value,
    type:  el.type,
    ss:    el.selectionStart,
    se:    el.selectionEnd,
  };
}

function _restoreFocus(snap){
  /* Since render() now only fires after blur (16ms deferred),
     focus has already moved to wherever the user clicked.
     We only need to restore the value if render() overwrote it
     with a stale state value. We do NOT re-focus — that would
     pull focus away from whatever the user clicked on. */
  if(!snap) return;
  const el = document.getElementById(snap.id);
  if(!el) return;
  if(el.value !== snap.value) el.value = snap.value;
}

        ${[['Federal',res.fed,'#E24B4A'],['Social Security',res.ss,'#854F0B'],['Medicare',res.med,'#BA7517'],[`${pc.state||'CA'} state`,res.st,'#534AB7']].map(([l,a,c])=>`<div style="margin-bottom:9px;padding-left:8px;"><div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="font-size:13px;color:var(--tx);">↳ ${l}</span><span style="font-size:13px;font-weight:600;color:${c};">−${fmtI(a)}/yr</span></div><div class="pb"><div class="pf" style="width:${Math.min(Math.round(a/res.ag*300),100)}%;background:${c};"></div></div></div>`).join('')}
        ${res.apost>0?`<div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin:8px 0 7px;">Post-tax</div>${(pc.postTax||[]).filter(d=>+d.amt>0).map(d=>`<div style="display:flex;justify-content:space-between;margin-bottom:6px;padding-left:8px;"><span style="font-size:13px;color:var(--tx);">↳ ${d.label||'Unnamed'}</span><span style="font-size:13px;font-weight:600;color:var(--tx2);">−${fmtI((+d.amt)*res.n)}/yr</span></div>`).join('')}`:''}
        <div style="display:flex;justify-content:space-between;padding-top:11px;border-top:2px solid var(--bd);"><span style="font-size:15px;font-weight:700;color:var(--tx);">Take-home</span><span style="font-size:17px;font-weight:700;color:${T.tx};">${fmtI(res.net)}/yr</span></div>
        <div style="display:flex;justify-content:flex-end;margin-top:3px;"><span style="font-size:13px;color:${T.tx};">${fmtI(mo)}/mo · ${fmtI(wk)}/wk</span></div>
      </div>
      <div class="tip" style="background:${T.bg};color:${T.tx};">Estimates use 2024 standard deductions. Pre-tax contributions lower your tax bill.</div>
      <button class="add-btn" style="border-style:solid;background:${T.bg};color:${T.tx};border-color:${T.ac}50;font-weight:700;" onclick="useAsInc(${Math.round(mo)})">✓ Use ${fmtI(mo)}/mo as budget income</button>`;

    /* ── Combined retirement contribution summary ── */
    const allDeds=[...(pc.preTax||[]),...(pc.postTax||[])];
    const retireDeds=allDeds.filter(d=>['401k','roth','ira','403b','457','retirement','invest'].some(k=>(d.label||'').toLowerCase().includes(k)));
    if(retireDeds.length>0){
      const freqMul={'weekly':52,'biweekly':26,'semimonthly':24,'monthly':12}[pc.freq||'biweekly']||26;
      h+=`<div class="sec">Retirement contributions this pay cycle</div>`;
      h+=`<div class="card" style="background:var(--gbg);border-color:var(--gm)30;">`;
      let grandYourTotal=0,grandMatchTotal=0;
      retireDeds.forEach(d=>{
        const perCheck=dedAmt(d,gross);
        const matchPerCheck=d.matchPctMode&&+d.matchPct>0?gross*(+d.matchPct)/100:(+d.matchAmt||0);
        const annual=perCheck*freqMul;
        const matchAnnual=matchPerCheck*freqMul;
        grandYourTotal+=annual;
        grandMatchTotal+=matchAnnual;
        h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--gm)15;">
          <div>
            <div style="font-size:14px;font-weight:700;color:var(--tx);">${d.label||'Retirement'}</div>
            <div style="font-size:11px;color:var(--tx2);">${d.pctMode?d.pct+'% of gross · ':''}${fmt(perCheck)}/pay${matchPerCheck>0?' · employer +'+fmt(matchPerCheck)+'/pay':''}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:14px;font-weight:700;color:var(--green);">${fmtI(annual+matchAnnual)}/yr</div>
            <div style="font-size:11px;color:var(--tx3);">${fmtI((annual+matchAnnual)/12)}/mo</div>
          </div>
        </div>`;
      });
      if(retireDeds.length>1){
        h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:4px;">
          <div>
            <div style="font-size:14px;font-weight:700;color:var(--tx);">Combined total</div>
            <div style="font-size:11px;color:var(--tx2);">Your: ${fmtI(grandYourTotal)}/yr · Employer: ${fmtI(grandMatchTotal)}/yr</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:16px;font-weight:700;color:var(--green);">${fmtI(grandYourTotal+grandMatchTotal)}/yr</div>
            <div style="font-size:11px;color:var(--green);font-weight:600;">${fmtI((grandYourTotal+grandMatchTotal)/12)}/mo combined</div>
          </div>
        </div>`;
      }
      h+=`</div>`;
    };
    }else{h+=`<div class="empty">Enter your gross pay above.</div>`;}
  }

  /* ── LOG ── */
  if(S.tab==='log'){
    const search=(S.logSearch||'').toLowerCase();
    const filt=S.logFilter||'all';
    const sort=S.logSort||'date-desc';

    /* Filter first */
    let filtered=[...(S.transactions||[])].filter(tx=>
      (filt==='all'||tx.catId===filt)&&
      (!search||tx.name.toLowerCase().includes(search)||(tx.note||'').toLowerCase().includes(search))
    );

    /* Sort */
    const sortFns={
      'date-desc': (a,b)=>new Date(b.year,b.month,b.day)-new Date(a.year,a.month,a.day),
      'date-asc':  (a,b)=>new Date(a.year,a.month,a.day)-new Date(b.year,b.month,b.day),
      'amount-desc':(a,b)=>b.amount-a.amount,
      'amount-asc': (a,b)=>a.amount-b.amount,
      'name-asc':   (a,b)=>a.name.localeCompare(b.name),
      'name-desc':  (a,b)=>b.name.localeCompare(a.name),
      'category':   (a,b)=>{
        const ca=S.categories.find(c=>c.id===a.catId)?.name||'';
        const cb=S.categories.find(c=>c.id===b.catId)?.name||'';
        return ca.localeCompare(cb)||new Date(b.year,b.month,b.day)-new Date(a.year,a.month,a.day);
      },
      'week': (a,b)=>{
        /* Group by week — sort newest week first, then by date within week */
        const weekA=Math.floor(new Date(a.year,a.month,a.day)/604800000);
        const weekB=Math.floor(new Date(b.year,b.month,b.day)/604800000);
        return weekB-weekA||new Date(b.year,b.month,b.day)-new Date(a.year,a.month,a.day);
      },
    };
    filtered.sort(sortFns[sort]||sortFns['date-desc']);

    /* Sort label for active button */
    const SORT_OPTS=[
      {id:'date-desc', label:'Newest first', icon:'📅'},
      {id:'date-asc',  label:'Oldest first', icon:'📅'},
      {id:'amount-desc',label:'Highest $',  icon:'💰'},
      {id:'amount-asc', label:'Lowest $',   icon:'💰'},
      {id:'name-asc',  label:'A → Z',       icon:'🔤'},
      {id:'name-desc', label:'Z → A',       icon:'🔤'},
      {id:'category',  label:'Category',    icon:'🏷️'},
      {id:'week',      label:'By week',     icon:'📆'},
    ];
    const activeSort=SORT_OPTS.find(o=>o.id===sort)||SORT_OPTS[0];

    /* Group label fn — changes based on sort */
    function getGroupLabel(tx){
      if(sort==='week'){
        const d=new Date(tx.year,tx.month,tx.day);
        /* Find Monday of that week */
        const day=d.getDay();
        const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));
        const sun=new Date(mon);sun.setDate(mon.getDate()+6);
        const fmt2=dt=>MONTHS_SHORT[dt.getMonth()]+' '+dt.getDate();
        return 'Week of '+fmt2(mon)+' – '+fmt2(sun);
      }
      if(sort==='category'){
        const cat=S.categories.find(c=>c.id===tx.catId);
        return cat?cat.emoji+' '+cat.name:'📦 Other';
      }
      /* For all other sorts — still group by month */
      return MONTHS[tx.month]+' '+tx.year;
    }

    /* Totals for current filter */
    const total=filtered.reduce((a,t)=>a+(+t.amount||0),0);

    h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div style="font-size:12px;font-weight:600;color:var(--tx3);letter-spacing:.04em;text-transform:uppercase;">📝 Log</div>

    </div>
    ${quickRemSheet('log')}`;

    /* Search bar */
    h+=`<div class="srch"><span>🔍</span><input type="text" placeholder="Search transactions..." value="${S.logSearch||''}" id="log-search"
  oninput="S.logSearch=this.value;save();clearTimeout(_timers['log-srch']);_timers['log-srch']=setTimeout(()=>{const el=document.getElementById('log-search');const v=el?el.value:'';const pos=el?[el.selectionStart,el.selectionEnd]:[0,0];render();const el2=document.getElementById('log-search');if(el2){el2.value=v;el2.focus();try{el2.setSelectionRange(pos[0],pos[1]);}catch(e){}}},200);"
  onblur="S.logSearch=this.value;save();"/>${S.logSearch?`<button onclick="S.logSearch='';save();render()" style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:16px;padding:0 4px;">✕</button>`:''}</div>`;

    h+=`<div class="f-row">
      <button class="fp ${filt==='all'?'on':''}" onclick="S.logFilter='all';save();render()">All</button>

    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;">

      <div class="f-row" style="margin-bottom:0;flex:1;overflow-x:auto;flex-wrap:nowrap;gap:5px;padding-bottom:2px;">
        ${SORT_OPTS.map(o=>`<button class="fp ${sort===o.id?'on':''}" style="white-space:nowrap;flex-shrink:0;" onclick="S.logSort='${o.id}';save();render()">${o.icon} ${o.label}</button>`).join('')}
      </div>
    </div>`;

    /* Summary line */
    if(filtered.length>0){
      h+=`<div style="font-size:12px;color:var(--tx2);margin-bottom:10px;display:flex;justify-content:space-between;">
        <span>${filtered.length} transaction${filtered.length!==1?'s':''}</span>
        <span style="font-weight:700;color:var(--tx);">Total: ${fmtI(total)}</span>
      </div>`;
    }

    if(!filtered.length){
      h+=`<div class="empty">No transactions found.<br>Try a different search or filter.</div>`;
    }

    /* Render with group headers */
    let lastGroup='';
    filtered.forEach(tx=>{
      const grp=getGroupLabel(tx);
      if(grp!==lastGroup){
        h+=`<div class="sec" style="margin-top:10px;">${grp}</div>`;
        lastGroup=grp;
      }
      const cat=S.categories.find(c=>c.id===tx.catId)||{emoji:'📦',color:'#888',name:'Other'};
      h+=`<div class="card card-sm" style="margin-bottom:7px;">
        <div style="display:flex;align-items:flex-start;gap:9px;">
          <span style="font-size:18px;margin-top:1px;">${cat.emoji}</span>
          <div style="flex:1;min-width:0;">
            <div style="font-size:14px;font-weight:600;color:var(--tx);">${tx.name}${tx.auto?'<span class="auto-b">auto</span>':tx.splitGroupId?'<span class="auto-b">split</span>':''}${tx.quickLog?'<span class="auto-b">quick</span>':''}${tx.emotion?` ${tx.emotion}`:''}</div>
            ${tx.note?`<div style="font-size:11px;color:var(--tx3);">${tx.note}</div>`:''}
            <div style="font-size:12px;color:var(--tx2);">${cat.name} · ${tx.day}/${tx.month+1}/${tx.year}</div>
          </div>
          <div style="font-size:15px;font-weight:700;color:${cat.color};white-space:nowrap;">${fmt(tx.amount)}</div>
          <button onclick="openEditTx('${tx.id}')" style="background:none;border:1px solid var(--bd);border-radius:7px;cursor:pointer;color:var(--tx2);font-size:12px;padding:4px 8px;font-family:inherit;flex-shrink:0;">✏️</button>
          <button onclick="delTx('${tx.id}')" style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:14px;padding:3px 7px;">✕</button>
        </div>
      </div>`;
    });

    h+=`<button class="add-btn" onclick="openM('addTx',null)">+ add transaction</button>`;
    h+=`<label class="scan-btn" onclick="openReceiptScanner()">📷 scan a receipt</label>`;
  }

  /* ── REMINDERS ── */
  if(S.tab==='reminders'){
    const rems=S.reminders||[];

    if(notifStatus==='default'){
      h+=`<div class="notif-banner" style="background:${T.bg};color:${T.tx};border:1px solid ${T.ac}30;">

      </div>`;
    } else if(notifStatus==='denied'){
      h+=`<div class="notif-banner" style="background:var(--abg);color:var(--amber);">

    h+=`<div class="tip" style="background:${T.bg};color:${T.tx};">Set reminders for any tab — Budget, Log, Reflect, or any combination. Each reminder can have its own schedule and vibration pattern. While the app is open, reminders will also buzz your device.</div>`;

    if(!rems.length){
      h+=`<div class="empty">No reminders set yet.<br>Add one below to get started.</div>`;
    }

    rems.forEach((rem,ri)=>{
      const freqLabel=(FREQ_OPTIONS.find(f=>f.id===rem.freq)||{label:'Daily'}).label;
      const tabLabels=(rem.tabs||[]).map(tid=>{const t=REM_TABS.find(x=>x.id===tid);return t?t.emoji+' '+t.label:'';}).filter(Boolean).join(', ')||'No tabs selected';
      h+=`<div class="rem-card">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
          <label class="tog"><input type="checkbox" ${rem.enabled?'checked':''} onchange="toggleReminderEnabled('${rem.id}')"/><span class="tog-sl"></span></label>

            onchange="updateReminder('${rem.id}','label',this.value)"
            placeholder="Reminder name"/>
          <button onclick="deleteReminder('${rem.id}')" style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:18px;padding:3px 6px;flex-shrink:0;">🗑</button>

        <div class="freq-grid">
          ${FREQ_OPTIONS.map(f=>`<button class="freq-btn ${rem.freq===f.id?'on':''}" onclick="updateReminder('${rem.id}','freq','${f.id}')">${f.label}</button>`).join('')}
        </div>

        <div style="font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px;">Vibration pattern</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${[['single','Single pulse'],['double','Double pulse'],['triple','Triple pulse'],['long','Long buzz']].map(([v,l])=>`<button onclick="updateReminder('${rem.id}','vibPattern','${v}')" style="padding:7px 11px;border-radius:8px;border:1px solid ${rem.vibPattern===v?'var(--ac-tx)':'var(--bd)'};background:${rem.vibPattern===v?'var(--ac-bg)':'var(--sur2)'};color:${rem.vibPattern===v?'var(--ac-tx)':'var(--tx2)'};font-size:12px;font-weight:${rem.vibPattern===v?700:500};cursor:pointer;font-family:inherit;">${l}</button>`).join('')}
        </div>

        <div style="font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px;">Remind me for these tabs</div>
        <div class="tab-check-grid">
          ${REM_TABS.map(t=>{const on=(rem.tabs||[]).includes(t.id);return`<div class="tab-chk ${on?'on':''}" onclick="toggleReminderTab('${rem.id}','${t.id}')">
            <span style="font-size:15px;">${t.emoji}</span>
            <span>${t.label}</span>
          </div>`;}).join('')}
        </div>

        ${rem.enabled?`<div style="margin-top:12px;display:flex;align-items:center;gap:8px;">
          <div style="flex:1;font-size:12px;color:var(--tx2);">Active · ${freqLabel} · ${(rem.tabs||[]).length} tab${(rem.tabs||[]).length!==1?'s':''}</div>
          <button onclick="fireReminder(S.reminders[${ri}])" style="background:var(--sur2);border:1px solid var(--bd);border-radius:7px;padding:5px 10px;font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer;font-family:inherit;">Test 🔔</button>
        </div>`:`<div style="margin-top:10px;font-size:12px;color:var(--tx3);">Paused — toggle on to activate</div>`}
      </div>`;
    });

    h+=`<button class="add-btn" onclick="addReminder()">+ add reminder</button>`;

    h+=`<div class="sec" style="margin-top:4px;">How reminders work</div>
    <div class="card card-sm" style="background:var(--sur2);">
      <div style="font-size:13px;color:var(--tx2);line-height:1.7;">
        <div>🔔 <strong>Notifications</strong> — appear even when Nudge is minimised (requires permission above)</div>
        <div style="margin-top:6px;">📳 <strong>Vibration</strong> — buzzes your device when the app is open and the reminder fires</div>

        <div style="margin-top:6px;">📱 <strong>Best results</strong> — keep Nudge open as a pinned tab or add it to your home screen</div>
      </div>
    </div>`;
  }

  /* ── CATEGORIES ── */
  if(S.tab==='categories'){
    h+=`<div class="sec">Your categories</div>
    <div class="tip" style="background:${T.bg};color:${T.tx};">Add, rename, recolour, and set budget alerts for any category. Default categories cannot be deleted.</div>`;

    S.categories.forEach((cat,ci)=>{
      const alertPct=S.catAlerts?.[cat.id]||0;
      h+=`<div class="cat-edit-row">
        <button onclick="openM('editCat','${cat.id}')" class="cat-emoji-btn" style="background:${cat.bg};">${cat.emoji}</button>
        <div style="flex:1;min-width:0;">
          <input type="text" id="catname-${cat.id}" value="${liveVal('catname-'+cat.id, cat.name)}" style="width:100%;background:var(--sur);border:1px solid var(--bd);border-radius:7px;padding:6px 9px;font-size:14px;font-weight:600;color:var(--tx);font-family:inherit;outline:none;margin-bottom:5px;"
            oninput="liveInput('catname-'+this.dataset.cid,()=>{updateCategory(this.dataset.cid,'name',this.value)})" data-cid="${cat.id}"
            onblur="blurInput('catname-'+this.dataset.cid,()=>{updateCategory(this.dataset.cid,'name',this.value)})" data-cid="${cat.id}"/>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:12px;color:var(--tx2);">Budget $</span>
            <input type="number" id="catbud-${cat.id}" value="${liveVal('catbud-'+cat.id, cat.budget||0)}" style="width:80px;background:var(--sur2);border:1px solid var(--bd);border-radius:6px;padding:4px 7px;font-size:13px;color:var(--tx);font-family:inherit;outline:none;"
              oninput="liveInput('catbud-'+this.dataset.cid,()=>{updateCategory(this.dataset.cid,'budget',+this.value)})" data-cid="${cat.id}"
              onblur="blurInput('catbud-'+this.dataset.cid,()=>{updateCategory(this.dataset.cid,'budget',+this.value)})" data-cid="${cat.id}"/>
            <span style="font-size:12px;color:var(--tx2);">Alert at</span>
            <select style="background:var(--sur2);border:1px solid var(--bd);border-radius:6px;padding:4px 7px;font-size:12px;color:var(--tx);font-family:inherit;outline:none;"
              onchange="S.catAlerts=S.catAlerts||{};S.catAlerts['${cat.id}']=+this.value;save();render()">
              <option value="0" ${!alertPct?'selected':''}>No alert</option>
              <option value="0.5"  ${alertPct===0.5 ?'selected':''}>50%</option>
              <option value="0.75" ${alertPct===0.75?'selected':''}>75%</option>
              <option value="0.9"  ${alertPct===0.9 ?'selected':''}>90%</option>
            </select>
            <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--tx2);cursor:pointer;">
              <input type="checkbox" ${cat.carryoverEnabled?'checked':''} onchange="updateCategory('${cat.id}','carryoverEnabled',this.checked)"/>

/* ══════════════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════════════ */
const g=id=>document.getElementById(id);
const gv=id=>(g(id)||{}).value||'';
const gn=id=>parseFloat(gv(id))||0;

function setTab(t){S.tab=t;S.expandedCat=null;S.modal=null;S._splits=[];S._splitTotal=0;save();render();}
function prevM(){S.month===0?(S.month=11,S.year--):S.month--;S.expandedCat=null;render();}
function nextM(){S.month===11?(S.month=0,S.year++):S.month++;S.expandedCat=null;render();}
function toggleCat(id){if(S.modal)return;S.expandedCat=S.expandedCat===id?null:id;render();}
function saveInc(){
  const el=g('ii');
  if(!el||el.value===''){S.editIncome=false;save();if(!S.modal)setTimeout(()=>render(),16);return;}
  const val=parseFloat(el.value)||0;
  if(_liveId==='ii')_liveId=null;
  clearTimeout(_timers['ii']);
  /* If income sources exist, update the first source's monthly
     so there is only ONE income number in the system */
  if(S.incomeSources&&S.incomeSources.length>0){
    S.incomeSources[0].monthly=val;
    S.incomeSources[0].amount=val;
  } else {
    S.income=val;
  }
  S.editIncome=false;
  save();
  if(!S.modal) setTimeout(()=>render(),16);
}
function openM(m,data=null){
  S.modal=m;
  S.modalData=data;
  S._pendingEmo='';
  /* Reset date on fresh transaction open so it defaults to today */
  if(m==='addTx'){
    if(!S._txDraft)S._txDraft={name:'',amt:'',note:'',catId:'',date:''};
    S._txDraft.date='';
  }
  render();
}
function closeM(){S.modal=null;S.modalData=null;S._splits=[];S._splitTotal=0;S._txDraft={name:'',amt:'',note:'',catId:'',date:''};S._editRec=null;S._editTx=null;S._quickRem=null;S._scanState=null;S._scanResult=null;S._scanError=null;render();}
function setTheme(t){S.theme=t;save();render();}
function toggleDark(){S.darkMode=isDark()?'light':'dark';save();applyTheme();render();}
function useAsInc(mo){
  /* If income sources exist, update the first one's monthly equivalent
     instead of setting S.income separately — prevents double-counting */

function syncDedToBills(type,i,silent=false){

  if(!S.recurring)S.recurring=[];
  const syncId=type+'_'+i;

  if(ded.syncToBills&&+ded.amt>0){
    const catId=(S.categories.find(c=>c.id==='health')||S.categories.find(c=>c.id==='other')||S.categories[0]).id;
    const billData={
      dedSyncId:syncId,
      name:ded.label||'Paycheck deduction',
      amount:+ded.amt,
      catId,
      freq:ded.freq||'biweekly',
      dueDay:1,
      startDate:S.paycheck?.startDate||now.getTime(),
      auto:false,
    };
    if(existingIdx>=0){
      S.recurring[existingIdx]={...S.recurring[existingIdx],...billData};
      if(!silent)toast((ded.label||'Deduction')+' updated in Bills ✓');
    }else{
      S.recurring.push({id:'ded_'+Date.now().toString(36)+Math.random().toString(36).slice(2),...billData});
      if(!silent)toast((ded.label||'Deduction')+' added to Bills tab ✓');
    }
  }else{
    if(existingIdx>=0){
      S.recurring.splice(existingIdx,1);
      if(!silent)toast('Removed from Bills tab');
    }
  }
  save();
}

function addSplitRow(){

  /* default first split to the selected cat, second to first different cat */
  const usedCats=S._splits.map(s=>s.catId);
  const nextCat=S.categories.find(c=>!usedCats.includes(c.id))||S.categories[0];
  S._splits.push({catId:nextCat.id,amt:0});

function confirmSplitAdd(){
  const draft=S._txDraft||{};
  const name=(draft.name||gv('tn')).trim();
  const totalAmt=+(draft.amt)||gn('ta');
  const note=(draft.note||gv('tnote')).trim();
  const splits=S._splits||[];

  if(!name){toast('Please enter a transaction name');return;}
  if(totalAmt<=0){toast('Please enter the total amount');return;}
  if(!splits.length){toast('Add at least one split row, or use the regular Add button');return;}

  const splitTotal=splits.reduce((a,s)=>a+(+s.amt||0),0);
  if(Math.abs(splitTotal-totalAmt)>0.02){
    toast('Split amounts must add up to the total ('+fmt(totalAmt)+')');return;
  }

  if(!S.transactions)S.transactions=[];
  const groupId='split_'+Date.now().toString(36);

  splits.forEach((sp,i)=>{
    if(!sp.amt||sp.amt<=0)return;
    const spDateEl=document.getElementById('tdate');
    const spDateStr=spDateEl?.value||draft.date||now.toISOString().split('T')[0];
    const spDate=new Date(spDateStr+'T12:00:00');
    const spDay=spDate.getDate()||now.getDate();
    const spMonth=isNaN(spDate)?now.getMonth():spDate.getMonth();
    const spYear=isNaN(spDate)?now.getFullYear():spDate.getFullYear();
    S.transactions.push({
      id:groupId+'_'+i,
      splitGroupId:groupId,
      splitIndex:i,
      splitTotal:totalAmt,
      name:name+(splits.length>1?' (split '+(i+1)+'/'+splits.length+')':''),
      amount:+sp.amt,
      catId:sp.catId,
      month:spMonth,year:spYear,day:spDay,
      note:note||(splits.length>1?'Split transaction':''),
      emotion:S._pendingEmo||'',
      auto:false,
    });
  });

  markStreak();
  S.modal=null;S._splits=[];S._pendingEmo='';S._splitTotal=0;S._txDraft={name:'',amt:'',note:'',catId:''};
  save();toast('Split transaction added ✓ ('+splits.length+' parts)');render();
}

  if(S._quickRem&&S._quickRem.tab===tabId&&S._quickRem.open){
    S._quickRem=null;
  } else {
    S._quickRem={tab:tabId,freq:'daily',open:true};
  }
  render();
}

function setQuickRemFreq(freq){
  if(!S._quickRem)return;
  S._quickRem.freq=freq;
  render();
}

function saveQuickRem(){
  if(!S._quickRem)return;
  const {tab,freq}=S._quickRem;
  const tabInfo=REM_TABS.find(t=>t.id===tab)||{id:tab,label:tab,emoji:'🔔'};
  if(!S.reminders)S.reminders=[];

  /* check for duplicate — same tab + same freq */
  const exists=S.reminders.find(r=>r.tabs&&r.tabs.includes(tab)&&r.freq===freq&&r.enabled);
  if(exists){
    toast('You already have a '+FREQ_OPTIONS.find(f=>f.id===freq)?.label+' reminder for '+tabInfo.label);
    S._quickRem=null;render();return;
  }

  const id='rem_'+Date.now().toString(36);
  const reminder={
    id,
    label:tabInfo.emoji+' '+tabInfo.label+' reminder',
    enabled:true,
    freq,
    tabs:[tab],
    vibPattern:'single',
    createdAt:Date.now(),
  };
  S.reminders.push(reminder);
  startReminder(reminder);
  S._quickRem=null;
  save();
  toast('Reminder set — '+FREQ_OPTIONS.find(f=>f.id===freq)?.label+' for '+tabInfo.emoji+' '+tabInfo.label+' ✓');
  render();
}

function getTabReminders(tabId){
  return (S.reminders||[]).filter(r=>r.enabled&&r.tabs&&r.tabs.includes(tabId));
}

function quickRemBell(tabId){

/* ── SPENDING WEATHER ──
   One glance, instant understanding of the day */
function spendingWeather(){
  const safe=safeAmt();
  const todS=todaySpent();
  const pct=safe>0?todS/safe:0;
  if(pct<=0)        return {icon:'☀️', label:'Clear skies', color:'var(--green)', bg:'var(--gbg)', msg:'No spending today. Great start.'};
  if(pct<=0.4)      return {icon:'🌤', label:'Looking good', color:'var(--green)', bg:'var(--gbg)', msg:'Well under your daily budget.'};
  if(pct<=0.7)      return {icon:'⛅', label:'On track',     color:'var(--ac)',    bg:'var(--ac-bg)', msg:'Steady. About halfway through your daily budget.'};
  if(pct<=0.9)      return {icon:'🌥', label:'Getting close',color:'var(--amber)', bg:'var(--abg)', msg:'Most of your daily budget is used.'};
  if(pct<=1)        return {icon:'🌦', label:'Almost there', color:'var(--amber)', bg:'var(--abg)', msg:'Nearly at your daily limit.'};
  return              {icon:'🌧', label:'Over today',    color:'var(--red)',   bg:'var(--rbg)', msg:'Over today — and that is OK. Tomorrow is a fresh start.'};
}

/* ── WIN CELEBRATIONS ── */
function checkForWin(){
  const w=[];
  const pct=totalInc()>0?totalSpent()/totalInc():0;
  const streak=streakCount();
  if(streak>=3)  w.push({emoji:'🔥',msg:''+streak+'-day logging streak! Showing up matters.'});
  if(pct<=0.5&&totalSpent()>0) w.push({emoji:'⭐',msg:'Halfway through the month and only '+Math.round(pct*100)+'% spent. Solid.'});
  const todS=todaySpent(),safe=safeAmt();
  if(todS===0&&safe>0) w.push({emoji:'✨',msg:'No spending today. Your future self appreciates it.'});
  const wr=(S.wishlist||[]).filter(w=>w.approved&&!w.bought);
  if(wr.length>0) w.push({emoji:'🧠',msg:'You paused on '+wr.length+' wish item'+( wr.length>1?'s':'')+'. That pause is the skill.'});
  return w.slice(0,1); /* show max 1 at a time to avoid overwhelm */
}

/* ── UPCOMING BILL NUDGE ──
   Returns bills due in next 3 days for the Today tab */
function upcomingBillNudges(){
  const alerts=[];
  const today=now.getDate();
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  (S.recurring||[]).forEach(bill=>{
    if(!bill.dueDay)return;
    const due=+bill.dueDay;
    const daysUntil=due>=today?due-today:due+(daysInMonth-today);
    if(daysUntil<=3&&daysUntil>=0){
      alerts.push({...bill,daysUntil,due});
    }
  });
  return alerts.sort((a,b)=>a.daysUntil-b.daysUntil);
}

async function handleReceiptImage(file){
  if(!file) return;
  S._scanState = 'scanning';
  render();

  try{
    /* Compress image before sending — reduces size from ~3MB to ~200kb */
    const base64 = await new Promise((res, rej) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        /* Resize to max 1000px on longest side */
        const MAX = 1000;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        /* Compress to JPEG at 70% quality */
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        res(dataUrl.split(',')[1]);
      };
      img.onerror = () => rej(new Error('Could not load image'));
      img.src = url;
    });

    const mediaType = 'image/jpeg';

    /* Call Claude vision API */
    /* ── Call proxy (avoids CORS restrictions in browser/WebView)
       Replace NUDGE_PROXY_URL with your Vercel deployment URL
       e.g. https://nudge-scan-proxy.vercel.app/api/scan      ── */
    const PROXY_URL = 'https://nudge-scan.vercel.app/api/scan';

    /* 30 second timeout for slow mobile connections */
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 30000);

    const response = await fetch(PROXY_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({image: base64, mediaType}),
      signal: controller.signal,
    });
    clearTimeout(timeoutId);

    if(!response.ok){
      const err = await response.json().catch(()=>({}));
      throw new Error(err?.error || 'Proxy error '+response.status);
    }

    const data = await response.json();
    const raw = data.text || '';

    /* Parse JSON from response */
    let result;
    try{
      const clean = raw.replace(/```json|```/g,'').trim();
      result = JSON.parse(clean);
    }catch(e){
      throw new Error('Could not read receipt — try a clearer photo');
    }

    /* Map category to existing category */
    const catMap = {
      food:      S.categories.find(c=>c.id==='food')?.id      || S.categories[0]?.id,
      transport: S.categories.find(c=>c.id==='trans')?.id     || S.categories[0]?.id,
      health:    S.categories.find(c=>c.id==='health')?.id    || S.categories[0]?.id,
      fun:       S.categories.find(c=>c.id==='fun')?.id       || S.categories[0]?.id,
      rent:      S.categories.find(c=>c.id==='rent')?.id      || S.categories[0]?.id,
      other:     S.categories.find(c=>c.id==='other')?.id     || S.categories[0]?.id,
    };

    const catId = catMap[result.category] || S.categories[0]?.id || 'other';
    const itemNote = result.items?.length ? result.items.join(', ') : '';

    /* Pre-fill _txDraft */
    /* Parse date from receipt — convert to YYYY-MM-DD */
    let receiptDate = now.toISOString().split('T')[0];
    if(result.date && result.date.match(/^\d{4}-\d{2}-\d{2}$/)){
      receiptDate = result.date;
    }
    S._txDraft = {
      name:  result.store || 'Receipt',
      amt:   result.total ? String(result.total) : '',
      note:  itemNote,
      catId: catId,
      date:  receiptDate,
    };

    S._scanState = 'done';
    S._scanResult = result;

    /* Open the add transaction modal with pre-filled data */
    S.modal = 'addTx';
    S.modalData = catId;

    save();
    render();
    toast('Receipt scanned ✓ — check the details below');

  } catch(err){
    S._scanState = 'error';
    const msg = err.name==='AbortError'
      ? 'Timed out — check your internet connection and try again'
      : err.message||'Could not scan receipt';
    S._scanError = msg;
    render();
    toast('Scan failed: '+msg);
  }
}

/* 2025 IRS contribution limits */
const IRS_LIMITS = {
  '401k':   23500,
  'roth':    7000,
  'trad':    7000,
  'hsa':     4300,
  'other':   0,

const ACCT_TYPES = [

  {id:'roth',  label:'Roth IRA',        emoji:'🌱', taxType:'Post-tax'},

  {id:'other', label:'Brokerage',       emoji:'📈', taxType:'Taxable'},
];

function retireProjection(acct, currentAge, retireAge){
  /* Future value with monthly contributions using compound interest */
  const years = Math.max(0, retireAge - currentAge);
  const months = years * 12;
  const r = (acct.rateOfReturn||7) / 100 / 12; /* monthly rate */
  const balance = +acct.balance || 0;
  const contrib = (+acct.monthlyContrib||0) + (+acct.employerMatch||0);

  if(months <= 0) return balance;
  if(r === 0) return balance + contrib * months;

  /* FV = PV*(1+r)^n + PMT*[((1+r)^n - 1)/r] */
  const fv = balance * Math.pow(1+r, months) +
             contrib * ((Math.pow(1+r, months) - 1) / r);
  return Math.round(fv);
}

function totalRetireProjection(){
  const r = S.retirement || {};
  return (r.accounts||[]).reduce((a, acct) =>
    a + retireProjection(acct, r.currentAge||30, r.retireAge||65), 0);
}

function totalRetireBalance(){
  return (S.retirement?.accounts||[]).reduce((a,acct)=>a+(+acct.balance||0),0);
}

function totalMonthlyRetireContrib(){
  return (S.retirement?.accounts||[]).reduce((a,acct)=>
    a+(+acct.monthlyContrib||0)+(+acct.employerMatch||0),0);
}

function onTrackStatus(){
  /* Simple on-track check: rule of thumb — by age X you should
     have X/35 * (annual income) saved. Simplified version. */
  const age = S.retirement?.currentAge || 30;
  const bal = totalRetireBalance();
  const inc = totalInc() * 12;
  if(!inc) return null;
  /* Fidelity guideline: 1x salary by 30, 3x by 40, 6x by 50, 8x by 60 */
  const targets = [{a:30,m:1},{a:40,m:3},{a:50,m:6},{a:60,m:8},{a:67,m:10}];
  const target = targets.reduce((prev,t) => age>=t.a?t:prev, targets[0]);
  const needed = inc * target.m;
  const pct = needed > 0 ? bal/needed : 0;
  if(pct >= 1)   return {label:'On track ✓',    color:'var(--green)', bg:'var(--gbg)', pct};
  if(pct >= 0.7) return {label:'Getting there',  color:'var(--amber)', bg:'var(--abg)', pct};
  return           {label:'Room to grow',        color:'var(--ac)',    bg:'var(--ac-bg)', pct};
}

  <button onclick="installPWA()" style="background:#2D7D46;border:none;color:#fff;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;">Add</button>
  <button onclick="dismissInstall()" style="background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:4px 6px;">×</button>
</div>
