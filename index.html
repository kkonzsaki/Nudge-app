<!DOCTYPE html>
<html lang="en" data-mode="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nudge — Your money, your pace.</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F4F0;--sur:#FFFFFF;--sur2:#F1EFE8;--sur3:#E5E3DC;
  --tx:#1a1a18;--tx2:#5F5E5A;--tx3:#999890;
  --bd:rgba(0,0,0,0.09);--bd2:rgba(0,0,0,0.2);
  --r:14px;--ac:#378ADD;--ac-bg:#E6F1FB;--ac-tx:#185FA5;
  --green:#3B6D11;--gbg:#EAF3DE;--gm:#639922;
  --red:#A32D2D;--rbg:#FCEBEB;--rm:#E24B4A;
  --amber:#854F0B;--abg:#FAEEDA;--am:#BA7517;
  --shadow:0 1px 4px rgba(0,0,0,0.06);
}
html[data-mode=dark]{
  --bg:#0f0f0d;--sur:#1c1c19;--sur2:#252520;--sur3:#2e2e28;
  --tx:#f0efe8;--tx2:#a09e98;--tx3:#6b6a64;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.15);
  --green:#97C459;--gbg:#1a2e0a;--gm:#639922;
  --red:#F09595;--rbg:#2e0f0f;--rm:#E24B4A;
  --amber:#EF9F27;--abg:#2a1e06;--am:#BA7517;
  --shadow:none;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);min-height:100vh;color:var(--tx);transition:background .2s,color .2s;}

/* ── layout ── */
.app{max-width:520px;margin:0 auto;padding:10px 13px 70px;}
.card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:15px;margin-bottom:10px;box-shadow:var(--shadow);}
.card-sm{padding:11px 13px;}
.sec{font-size:11px;font-weight:700;color:var(--tx2);letter-spacing:.07em;text-transform:uppercase;margin:16px 0 8px;}

/* ── header ── */
.hdr{text-align:center;padding:14px 0 8px;}
.hdr h1{font-size:22px;font-weight:700;color:var(--tx);letter-spacing:-.3px;}
.hdr-row{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:5px;}
.pill{font-size:12px;padding:3px 11px;border-radius:99px;cursor:pointer;font-weight:600;border:none;font-family:inherit;}
.mode-btn{background:var(--sur2);border:1px solid var(--bd);border-radius:99px;padding:4px 10px;font-size:13px;cursor:pointer;color:var(--tx2);}

/* ── nav ── */
.nav{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;background:var(--sur2);border-radius:13px;padding:4px;margin-bottom:13px;}
.nav::-webkit-scrollbar{display:none;}
.nt{padding:8px 4px;font-size:12px;font-weight:500;background:none;border:none;cursor:pointer;border-radius:9px;color:var(--tx2);font-family:inherit;white-space:nowrap;transition:all .15s;text-align:center;letter-spacing:.01em;width:100%;}
.nt.on{background:var(--sur);color:var(--tx);font-weight:700;box-shadow:var(--shadow);}

/* ── reminders ── */
.rem-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:13px 14px;margin-bottom:9px;box-shadow:var(--shadow);}
.rem-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.rem-row:last-child{margin-bottom:0;}
.tog{position:relative;width:42px;height:24px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-sl{position:absolute;inset:0;border-radius:99px;background:var(--sur3);border:1px solid var(--bd2);cursor:pointer;transition:.2s;}
.tog-sl:before{content:'';position:absolute;width:18px;height:18px;left:2px;top:2px;border-radius:50%;background:var(--tx3);transition:.2s;}
.tog input:checked+.tog-sl{background:var(--ac);border-color:var(--ac);}
.tog input:checked+.tog-sl:before{transform:translateX(18px);background:#fff;}
.freq-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;}
.freq-btn{padding:9px 6px;border-radius:9px;border:1px solid var(--bd);background:var(--sur2);font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;}
.freq-btn.on{background:var(--ac-bg);color:var(--ac-tx);border-color:var(--ac-tx);font-weight:700;}
.tab-check-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;}
.tab-chk{display:flex;align-items:center;gap:7px;background:var(--sur2);border:1px solid var(--bd);border-radius:9px;padding:8px 10px;cursor:pointer;}
.tab-chk.on{background:var(--ac-bg);border-color:var(--ac-tx);}
.tab-chk span{font-size:12px;font-weight:500;color:var(--tx2);}
.tab-chk.on span{color:var(--ac-tx);font-weight:700;}
.notif-banner{border-radius:11px;padding:11px 13px;margin-bottom:10px;font-size:13px;line-height:1.5;}

/* ── ring ── */
.ring-wrap{display:flex;flex-direction:column;align-items:center;}
.ring-c{position:relative;width:130px;height:130px;margin-bottom:11px;}
.ring-svg{width:130px;height:130px;transform:rotate(-90deg);}
.r-bg{fill:none;stroke:var(--sur2);stroke-width:12;}
.r-fill{fill:none;stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1);}
.ring-mid{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}

/* ── chips ── */
.chips{display:flex;gap:7px;}
.chip{flex:1;background:var(--sur2);border-radius:10px;padding:9px 7px;text-align:center;}
.chip-v{font-size:14px;font-weight:700;}
.chip-l{font-size:10px;color:var(--tx2);margin-top:2px;}

/* ── progress ── */
.pb{height:8px;background:var(--sur2);border-radius:99px;overflow:hidden;}
.pf{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.pb-sm{height:5px;background:var(--sur2);border-radius:99px;overflow:hidden;margin-top:4px;}
.pf-sm{height:100%;border-radius:99px;}

/* ── tx items ── */
.tx-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-top:1px solid var(--bd);}
.tx-item:first-child{border-top:none;}
.tx-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.tx-del{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:13px;padding:2px 6px;border-radius:4px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.tx-item:hover .tx-del{opacity:1;}

/* ── modal ── */
.mbk{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
.mod{background:var(--sur);border-radius:22px 22px 0 0;padding:22px 18px 36px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.mod h2{font-size:18px;font-weight:700;color:var(--tx);margin-bottom:14px;}
.mrow{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.mrow label{font-size:13px;color:var(--tx2);width:82px;flex-shrink:0;}
.mrow input,.mrow select,.mrow textarea{flex:1;background:var(--sur2);border:1px solid var(--bd);border-radius:9px;padding:10px 11px;font-size:14px;color:var(--tx);outline:none;font-family:inherit;}
.mrow input:focus,.mrow select:focus,.mrow textarea:focus{border-color:var(--ac);}
.mrow textarea{resize:vertical;min-height:56px;font-size:13px;}
.macts{display:flex;gap:8px;margin-top:14px;}
.btn-c{flex:1;background:var(--sur2);border:1px solid var(--bd);border-radius:10px;padding:11px;font-size:14px;font-weight:500;cursor:pointer;color:var(--tx);font-family:inherit;}
.btn-ok{flex:2;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;color:#fff;font-family:inherit;}

/* ── misc ── */
.srow{display:flex;align-items:center;gap:9px;background:var(--sur2);border-radius:10px;padding:10px 13px;margin-bottom:7px;}
.srow span{flex:1;font-size:14px;color:var(--tx);}
.srow input[type=number],.srow select{width:96px;background:var(--sur);border:1px solid var(--bd);border-radius:6px;padding:6px 8px;font-size:13px;color:var(--tx);text-align:right;font-family:inherit;outline:none;}
.add-btn{width:100%;background:var(--sur);border:1.5px dashed var(--bd2);border-radius:var(--r);padding:11px;font-size:13px;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;font-family:inherit;transition:all .15s;}
.add-btn:hover{background:var(--sur2);color:var(--tx);border-style:solid;}
.tip{border-radius:11px;padding:11px 13px;margin-bottom:10px;font-size:13px;line-height:1.55;}
.empty{text-align:center;padding:28px 14px;color:var(--tx2);font-size:14px;line-height:1.6;}
.th-dot{width:31px;height:31px;border-radius:8px;cursor:pointer;border:3px solid transparent;transition:all .12s;display:inline-block;}
.th-dot.sel{border-color:var(--tx);}
.f-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:9px;}
.f-row::-webkit-scrollbar{display:none;}
.fp{background:var(--sur2);border:1px solid var(--bd);border-radius:99px;padding:5px 11px;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.fp.on{background:var(--ac-bg);color:var(--ac-tx);border-color:var(--ac-tx);}
.auto-b{font-size:9px;background:var(--sur2);color:var(--tx2);padding:2px 5px;border-radius:99px;margin-left:4px;}
.srch{display:flex;align-items:center;background:var(--sur);border:1px solid var(--bd);border-radius:10px;padding:0 11px;margin-bottom:9px;gap:7px;}
.srch input{flex:1;background:none;border:none;padding:11px 0;font-size:14px;color:var(--tx);outline:none;font-family:inherit;}
#toast{position:fixed;top:15px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#f0efe8;padding:9px 18px;border-radius:99px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.25);}
html[data-mode=dark] #toast{background:#f0efe8;color:#1a1a18;}
#toast.show{opacity:1;}

/* ── emotion tags ── */
.emo-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.emo-btn{background:var(--sur2);border:1px solid var(--bd);border-radius:99px;padding:5px 10px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .12s;}
.emo-btn.sel{border-color:var(--ac);background:var(--ac-bg);font-weight:600;}

/* ── impulse ── */
.impulse-big{font-size:36px;font-weight:700;text-align:center;padding:8px 0 4px;}
.impulse-q{font-size:16px;font-weight:600;text-align:center;color:var(--tx2);margin-bottom:16px;}
.imp-choice{display:flex;gap:10px;margin-top:4px;}
.imp-btn{flex:1;padding:14px;border-radius:13px;border:none;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;}

/* ── wishlist ── */
.wish-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--bd);}
.wish-item:first-child{border-top:none;}
.wish-timer{font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;}

/* ── calendar ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{min-height:34px;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--tx2);position:relative;}
.cal-day.today{background:var(--ac-bg);color:var(--ac-tx);font-weight:700;}
.cal-day.has-bill::after{content:'';position:absolute;bottom:4px;width:5px;height:5px;border-radius:50%;background:var(--rm);}
.cal-day.overdue-bill::after{background:#E24B4A;}

/* ── reflection ── */
.refl-q{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:10px;}
.refl-entry{background:var(--sur2);border-radius:10px;padding:11px 13px;margin-bottom:8px;}

/* ── net worth ── */
.nw-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:1px solid var(--bd);}
.nw-row:first-child{border-top:none;}

/* ── goals ── */
.goal-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:13px 14px;margin-bottom:9px;box-shadow:var(--shadow);}

/* ── onboarding ── */
.onb-step{text-align:center;padding:20px 10px;}
.onb-emoji{font-size:52px;margin-bottom:14px;}
.onb-title{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:8px;}
.onb-desc{font-size:14px;color:var(--tx2);line-height:1.6;margin-bottom:22px;}
.onb-dots{display:flex;gap:6px;justify-content:center;margin-top:16px;}
.onb-dot{width:7px;height:7px;border-radius:50%;}
</style>
</head>
<body>
<div class="app" id="root"></div>
<div id="toast"></div>
<script>
/* ══════════════════════════════════════════════════
   TAX ENGINE

const STATE_TAX={AL:{n:'Alabama',b:[[0,2,0],[500,4,500],[3000,5,3000]]},AK:{n:'Alaska',b:[[0,0,0]]},AZ:{n:'Arizona',b:[[0,2.5,0]]},AR:{n:'Arkansas',b:[[0,2,0],[4999,4,4999],[8500,4.9,8500]]},CA:{n:'California',b:[[0,1,0],[10099,2,10099],[23942,4,23942],[37788,6,37788],[52455,8,52455],[66295,9.3,66295],[338639,10.3,338639],[406364,11.3,406364],[677275,12.3,677275]]},CO:{n:'Colorado',b:[[0,4.4,0]]},CT:{n:'Connecticut',b:[[0,3,0],[10000,5,10000],[50000,5.5,50000],[100000,6,100000],[200000,6.5,200000],[250000,6.9,250000],[500000,6.99,500000]]},DE:{n:'Delaware',b:[[0,0,0],[2000,2.2,2000],[5000,3.9,5000],[10000,4.8,10000],[20000,5.2,20000],[25000,5.55,25000],[60000,6.6,60000]]},FL:{n:'Florida',b:[[0,0,0]]},GA:{n:'Georgia',b:[[0,5.49,0]]},HI:{n:'Hawaii',b:[[0,1.4,0],[2400,3.2,2400],[4800,5.5,4800],[9600,6.4,9600],[14400,6.8,14400],[19200,7.2,19200],[24000,7.6,24000],[36000,7.9,36000],[48000,8.25,48000],[150000,9,150000],[175000,10,175000],[200000,11,200000]]},ID:{n:'Idaho',b:[[0,5.8,0]]},IL:{n:'Illinois',b:[[0,4.95,0]]},IN:{n:'Indiana',b:[[0,3.05,0]]},IA:{n:'Iowa',b:[[0,4.4,0],[6000,4.82,6000],[30000,5.7,30000]]},KS:{n:'Kansas',b:[[0,3.1,0],[15000,5.25,15000],[30000,5.7,30000]]},KY:{n:'Kentucky',b:[[0,4,0]]},LA:{n:'Louisiana',b:[[0,1.85,0],[12500,3.5,12500],[50000,4.25,50000]]},ME:{n:'Maine',b:[[0,5.8,0],[23000,6.75,23000],[54450,7.15,54450]]},MD:{n:'Maryland',b:[[0,2,0],[1000,3,1000],[2000,4,2000],[3000,4.75,3000],[100000,5,100000],[125000,5.25,125000],[150000,5.5,150000],[250000,5.75,250000]]},MA:{n:'Massachusetts',b:[[0,5,0],[1000000,9,1000000]]},MI:{n:'Michigan',b:[[0,4.25,0]]},MN:{n:'Minnesota',b:[[0,5.35,0],[30070,6.8,30070],[98760,7.85,98760],[183340,9.85,183340]]},MS:{n:'Mississippi',b:[[0,0,0],[10000,4.7,10000]]},MO:{n:'Missouri',b:[[0,1.5,0],[1121,2,1121],[2242,2.5,2242],[3363,3,3363],[4484,3.5,4484],[5605,4,5605],[6726,4.5,6726],[7847,4.95,7847]]},MT:{n:'Montana',b:[[0,4.7,0],[20500,5.9,20500]]},NE:{n:'Nebraska',b:[[0,2.46,0],[3700,3.51,3700],[22170,5.01,22170],[32210,6.84,32210]]},NV:{n:'Nevada',b:[[0,0,0]]},NH:{n:'New Hampshire',b:[[0,0,0]]},NJ:{n:'New Jersey',b:[[0,1.4,0],[20000,1.75,20000],[35000,3.5,35000],[40000,5.525,40000],[75000,6.37,75000],[500000,8.97,500000],[1000000,10.75,1000000]]},NM:{n:'New Mexico',b:[[0,1.7,0],[5500,3.2,5500],[11000,4.7,11000],[16000,4.9,16000],[210000,5.9,210000]]},NY:{n:'New York',b:[[0,4,0],[8500,4.5,8500],[11700,5.25,11700],[13900,5.85,13900],[21400,6.25,21400],[80650,6.85,80650],[215400,9.65,215400],[1077550,10.3,1077550],[5000000,10.9,5000000]]},NC:{n:'North Carolina',b:[[0,4.5,0]]},ND:{n:'North Dakota',b:[[0,1.95,0],[44725,3.05,44725]]},OH:{n:'Ohio',b:[[0,0,0],[26050,2.765,26050],[100000,3.226,100000]]},OK:{n:'Oklahoma',b:[[0,0.25,0],[1000,0.75,1000],[2500,1.75,2500],[3750,2.75,3750],[4900,3.75,4900],[7200,4.75,7200]]},OR:{n:'Oregon',b:[[0,4.75,0],[18400,6.75,18400],[250000,8.75,250000]]},PA:{n:'Pennsylvania',b:[[0,3.07,0]]},RI:{n:'Rhode Island',b:[[0,3.75,0],[73450,4.75,73450],[166950,5.99,166950]]},SC:{n:'South Carolina',b:[[0,0,0],[3200,3,3200],[16040,6.5,16040]]},SD:{n:'South Dakota',b:[[0,0,0]]},TN:{n:'Tennessee',b:[[0,0,0]]},TX:{n:'Texas',b:[[0,0,0]]},UT:{n:'Utah',b:[[0,4.65,0]]},VT:{n:'Vermont',b:[[0,3.35,0],[45400,6.6,45400],[110050,7.6,110050],[229550,8.75,229550]]},VA:{n:'Virginia',b:[[0,2,0],[3000,3,3000],[5000,5,5000],[17000,5.75,17000]]},WA:{n:'Washington',b:[[0,0,0]]},WV:{n:'West Virginia',b:[[0,2.36,0],[10000,3.15,10000],[25000,3.54,25000],[40000,4.72,40000],[60000,5.12,60000]]},WI:{n:'Wisconsin',b:[[0,3.5,0],[14320,4.4,14320],[28640,5.3,28640],[315310,7.65,315310]]},WY:{n:'Wyoming',b:[[0,0,0]]},DC:{n:'Washington DC',b:[[0,4,0],[10000,6,10000],[40000,6.5,40000],[60000,8.5,60000],[350000,9.25,350000],[1000000,10.75,1000000]]}};
const SL=Object.entries(STATE_TAX).map(([c,d])=>({c,n:d.n})).sort((a,b)=>a.n.localeCompare(b.n));
const FB_S=[[0,10,0],[11600,12,11600],[47150,22,47150],[100525,24,100525],[191950,32,191950],[243725,35,243725],[609350,37,609350]];
const FB_M=[[0,10,0],[23200,12,23200],[94300,22,94300],[201050,24,201050],[383900,32,383900],[487450,35,487450],[731200,37,731200]];
const FB_H=[[0,10,0],[16550,12,16550],[63100,22,63100],[100500,24,100500],[191950,32,191950],[243700,35,243700],[609350,37,609350]];
const SD_TAX={single:14600,married:29200,hoh:21900};
function bracketTax(inc,bk){let t=0;for(let i=bk.length-1;i>=0;i--){const[f,r]=bk[i];if(inc>f){t+=(inc-f)*(r/100);inc=f;}}return t;}
function calcPay(gross,freq,state,filing,pre=[],post=[]){
  const n={weekly:52,biweekly:26,semimonthly:24,monthly:12}[freq]||26;
  const ag=gross*n,apt=(pre||[]).reduce((s,d)=>s+(+d.amt||0)*n,0),apost=(post||[]).reduce((s,d)=>s+(+d.amt||0)*n,0);
  const sd=SD_TAX[filing]||SD_TAX.single,ti=Math.max(0,ag-apt-sd);
  const fb=filing==='married'?FB_M:filing==='hoh'?FB_H:FB_S;
  const fed=bracketTax(ti,fb),ss=Math.min(ag,168600)*0.062;
  const med=ag<=200000?ag*0.0145:200000*0.0145+(ag-200000)*0.0235;
  const st=bracketTax(ti,(STATE_TAX[state]||{b:[[0,0,0]]}).b);
  return{ag,net:ag-fed-ss-med-st-apt-apost,fed,ss,med,st,n,apt,apost};
}

/* ══════════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════════ */
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WD=['Su','Mo','Tu','We','Th','Fr','Sa'];
const now=new Date();
const THEMES={
  calm:    {ac:'#378ADD',bg:'#E6F1FB',tx:'#185FA5',dbg:'#0d2540',dtx:'#85B7EB',n:'Calm blue'},
  forest:  {ac:'#639922',bg:'#EAF3DE',tx:'#3B6D11',dbg:'#142508',dtx:'#97C459',n:'Forest green'},

/* ── stable input system ──
   The root cause of cursor-jumping: render() rebuilds innerHTML and sets
   value="..." on inputs, which moves the cursor. Fix: track which input
   id is "live" (being typed into). During render, live inputs get no
   value attribute — the browser keeps whatever the user typed.
   On blur we do one final render to sync state cleanly.
── */
let _liveId = null;
const _timers = {};

function liveInput(id, updateFn) {
  /* call this from oninput. marks id as live, updates state, defers render */
  _liveId = id;
  updateFn();
  clearTimeout(_timers[id]);
  _timers[id] = setTimeout(() => {
    /* after 800ms idle: save + re-render but keep focus */
    save();
    const el = document.getElementById(_liveId);
    const pos = el ? [el.selectionStart, el.selectionEnd] : null;
    render();
    const el2 = document.getElementById(_liveId);
    if (el2) {
      el2.focus();
      if (pos) { try { el2.setSelectionRange(pos[0], pos[1]); } catch(e){} }
    }
  }, 800);
}

function blurInput(id, updateFn) {
  /* call this from onblur to do a clean sync render */
  if (_liveId === id) _liveId = null;
  clearTimeout(_timers[id]);
  updateFn();
  save();
  render();
}

/* liveVal: returns value for an input — empty string if it's currently live
   so render() doesn't overwrite what the user is typing */
function liveVal(id, stateVal) {
  return _liveId === id ? '' : (stateVal ?? '');
}

/* legacy shim so existing debounceRender calls still work */
function debounceRender(key, fn, delay=400){
  fn();
  clearTimeout(_timers[key]);
  _timers[key]=setTimeout(()=>render(), delay);
}

/* active interval handles keyed by reminder id */
const _remTimers={};

function startReminder(rem){
  stopReminder(rem.id);
  if(!rem.enabled||!rem.freq||!rem.tabs||!rem.tabs.length) return;
  const freq=FREQ_OPTIONS.find(f=>f.id===rem.freq);
  if(!freq) return;
  _remTimers[rem.id]=setInterval(()=>fireReminder(rem),freq.ms);
}

function stopReminder(id){
  if(_remTimers[id]){clearInterval(_remTimers[id]);delete _remTimers[id];}
}

function fireReminder(rem){
  /* vibrate */
  try{
    if(navigator.vibrate){
      const pattern=rem.vibPattern||'single';
      if(pattern==='single')   navigator.vibrate([200]);
      else if(pattern==='double') navigator.vibrate([150,80,150]);
      else if(pattern==='triple') navigator.vibrate([100,60,100,60,100]);
      else if(pattern==='long')   navigator.vibrate([500]);
    }
  }catch(e){}

  /* browser notification */
  const tab=REM_TABS.find(t=>rem.tabs&&rem.tabs[0]===t.id)||REM_TABS[0];
  const msgs=[
    'Time to check in with your money 💰',
    'Quick nudge — how are your finances doing?',
    'A gentle reminder to log your spending 📝',
    'Your budget is waiting for you!',
    "Don't forget to check in with Nudge 🧠",
    'Money check-in time — you got this ✓',
  ];
  const msg=msgs[Math.floor(Math.random()*msgs.length)];
  if(Notification&&Notification.permission==='granted'){
    try{
      new Notification('Nudge — '+tab.emoji+' '+tab.label,{
        body:msg,
        icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="%231D9E75"/><text x="32" y="44" font-size="36" text-anchor="middle" fill="white">n</text></svg>',
        badge:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="%231D9E75"/></svg>',
        tag:'nudge-'+rem.id,
        renotify:true,
        silent:false,
      });
    }catch(e){}
  }

  /* in-app toast nudge */
  toast(tab.emoji+' '+rem.label+' reminder: '+msg.split('—')[0].trim());
}

function syncAllReminders(){
  /* stop all, restart enabled ones */
  Object.keys(_remTimers).forEach(stopReminder);
  (S.reminders||[]).forEach(startReminder);
}

async function requestNotifPermission(){
  if(!('Notification' in window)){toast('Notifications not supported in this browser');return false;}
  if(Notification.permission==='granted') return true;
  const result=await Notification.requestPermission();
  render(); /* re-render to update permission status shown in UI */

function updateReminder(id,key,val){
  const rem=(S.reminders||[]).find(r=>r.id===id);
  if(!rem)return;
  rem[key]=val;

  if(key==='enabled'||key==='freq'||key==='tabs'){

  const rem=(S.reminders||[]).find(r=>r.id===remId);
  if(!rem)return;
  if(!rem.tabs)rem.tabs=[];
  if(rem.tabs.includes(tabId)) rem.tabs=rem.tabs.filter(t=>t!==tabId);

}

  }

  /* ── INSIGHTS ── */
  if(S.tab==='insights'){
    const months=[];for(let i=5;i>=0;i--){let m=S.month-i,y=S.year;while(m<0){m+=12;y--;}const ms=(S.transactions||[]).filter(t=>t.month===m&&t.year===y).reduce((a,t)=>a+(+t.amount||0),0);months.push({label:MS[m],spent:ms,m,y});}
    const maxS=Math.max(...months.map(x=>x.spent),1);
    h+=`<div class="sec">6-month spending</div>
    <div class="card">
      <div style="display:flex;align-items:flex-end;gap:5px;height:90px;margin-bottom:6px;">
        ${months.map((mx,i)=>{const hh=Math.round((mx.spent/maxS)*72);const isN=i===5;return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;"><div style="font-size:9px;color:var(--tx2);font-weight:600;">${mx.spent>0?fmtI(mx.spent):''}</div><div style="width:100%;height:${hh}px;background:${isN?T.ac:'var(--sur3)'};border-radius:4px 4px 0 0;min-height:3px;"></div><div style="font-size:10px;font-weight:${isN?700:500};color:${isN?T.tx:'var(--tx2)'};">${mx.label}</div></div>`;}).join('')}
      </div>

    <div class="sec">Emotion patterns this month</div>
    <div class="card">`;
    const emoTx=txM.filter(t=>t.emotion);

    <div class="sec">Budget vs actual</div>

  if(S.tab==='networth'){

  /* ── PAYCHECK ── */
  if(S.tab==='paycheck'){

    const dr=(d,i,type)=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:8px;"><input type="text" value="${liveVal('ded-${type}-${i}-label', d.label||'')}" placeholder="Name" style="flex:2;background:var(--sur2);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--tx);font-family:inherit;outline:none;" id="ded-${type}-${i}-label" oninput="liveInput('ded-${type}-${i}-label',()=>{updDSilent('${type}',${i},'label',this.value)})" onblur="blurInput('ded-${type}-${i}-label',()=>{updDSilent('${type}',${i},'label',this.value)})"/><div style="display:flex;align-items:center;background:var(--sur2);border:1px solid var(--bd);border-radius:8px;overflow:hidden;flex:1;"><span style="padding:0 6px;font-size:13px;color:var(--tx3);">$</span><input type="number" value="${liveVal('ded-${type}-${i}-amt', d.amt||'')}" placeholder="0" min="0" step="1" style="flex:1;background:none;border:none;padding:8px 4px 8px 0;font-size:13px;color:var(--tx);font-family:inherit;outline:none;width:55px;" id="ded-${type}-${i}-amt" oninput="liveInput('ded-${type}-${i}-amt',()=>{updDSilent('${type}',${i},'amt',+this.value)})" onblur="blurInput('ded-${type}-${i}-amt',()=>{updDSilent('${type}',${i},'amt',+this.value)})"/></div><button onclick="remD('${type}',${i})" style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:16px;padding:4px 5px;border-radius:5px;">✕</button></div>`;

    if(res){

    h+=`<div class="mbk" onclick="closeM()"><div class="mod" onclick="event.stopPropagation()">
      <h2>Add to wishlist</h2>
      <div class="mrow"><label>Name</label><input id="wn" type="text" placeholder="What do you want?"/></div>
      <div class="mrow"><label>Amount</label><input id="wa" type="number" placeholder="0.00" step="0.01" min="0"/></div>
      <div class="mrow"><label>Wait days</label><input id="wd2" type="number" value="${WISH_DAYS}" min="1" max="30"/></div>
      <div class="macts"><button class="btn-c" onclick="closeM()">Cancel</button><button class="btn-ok" style="background:${T.ac};" onclick="confirmWish()">Add to wishlist</button></div>
    </div></div>`;
  }
  if(mc==='newProfile'){
    h+=`<div class="mbk" onclick="closeM()"><div class="mod" onclick="event.stopPropagation()">
      <h2>Create new profile</h2>
      <div style="font-size:13px;color:var(--tx2);margin-bottom:13px;">e.g. "Mine", "Partner", "Work budget".</div>
      <div class="mrow"><label>Name</label><input id="pn" type="text" placeholder="My Profile" maxlength="32"/></div>
      <div class="macts"><button class="btn-c" onclick="closeM()">Cancel</button><button class="btn-ok" style="background:${T.ac};" onclick="confirmNewProfile()">Create</button></div>
    </div></div>`;
  }

  root.innerHTML=h;
  const focus={addTx:'tn',addRec:'rn',addGoal:'gn',editGoal:'gn',addAsset:'nwn',addDebt:'nwn',addIncome:'isn',addWish:'wn',newProfile:'pn'};
  if(mc&&focus[mc]){const el=document.getElementById(focus[mc]);if(el)el.focus();}
  if(S.editIncome){const el=document.getElementById('ii');if(el){el.focus();el.select();}}
}

/* ══════════════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════════════ */
const g=id=>document.getElementById(id);
const gv=id=>(g(id)||{}).value||'';
const gn=id=>parseFloat(gv(id))||0;

function setTab(t){S.tab=t;S.expandedCat=null;S.modal=null;save();render();}
function prevM(){S.month===0?(S.month=11,S.year--):S.month--;S.expandedCat=null;render();}
function nextM(){S.month===11?(S.month=0,S.year++):S.month++;S.expandedCat=null;render();}
function toggleCat(id){S.expandedCat=S.expandedCat===id?null:id;render();}
function saveInc(){const el=g('ii');if(el)S.income=parseFloat(el.value)||S.income;S.editIncome=false;save();render();}
function openM(m,data=null){S.modal=m;S.modalData=data;S._pendingEmo='';render();}
function closeM(){S.modal=null;S.modalData=null;render();}
function setTheme(t){S.theme=t;save();render();}
function toggleDark(){S.darkMode=isDark()?'light':'dark';save();applyTheme();render();}
function useAsInc(mo){S.income=mo;S.tab='budget';save();toast('Income updated to '+fmtI(mo)+'/mo ✓');render();}
function finishOnboard(){S.onboardDone=true;S.tab='budget';save();render();}
function selectReflEmo(e){document.querySelectorAll('.emo-btn').forEach(b=>{b.classList.toggle('sel',b.textContent.startsWith(e));});S._reflEmo=e;}

function confirmAdd(){
  const name=gv('tn').trim(),amount=gn('ta'),catId=gv('tc'),note=gv('tnote').trim();
  if(!name||amount<=0){toast('Please fill in name and amount');return;}
  if(!S.transactions)S.transactions=[];
  S.transactions.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2),name,amount,catId,month:S.month,year:S.year,day:now.getDate(),note,emotion:S._pendingEmo||'',auto:false});
  markStreak();S.modal=null;S.expandedCat=catId;S._pendingEmo='';save();toast('Added ✓');render();
}
function confirmRec(){
  const name=gv('rn').trim(),amount=gn('ra'),catId=gv('rc'),dueDay=gn('rd')||null;
  if(!name||amount<=0){toast('Fill in name and amount');return;}
  if(!S.recurring)S.recurring=[];
  S.recurring.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2),name,amount,catId,dueDay});
  S.modal=null;save();toast('Bill added ✓');render();
}
function confirmGoal(){
  const name=gv('gn').trim(),emoji=gv('ge')||'🎯',target=gn('gt'),saved=gn('gs'),monthly=gn('gm');
  if(!name||target<=0){toast('Fill in name and target');return;}
  if(!S.goals)S.goals=[];S.goals.push({id:Date.now().toString(36),name,emoji,target,saved,monthly});
  S.modal=null;save();toast('Goal added ✓');render();
}
function saveGoal(i){
  if(!S.goals||!S.goals[i])return;
  S.goals[i]={...S.goals[i],name:gv('gn').trim()||S.goals[i].name,emoji:gv('ge')||'🎯',target:gn('gt'),saved:gn('gs'),monthly:gn('gm')};
  S.modal=null;save();toast('Saved ✓');render();
}
function delGoal(i){if(S.goals&&S.goals[i]!==undefined)S.goals.splice(i,1);S.modal=null;save();render();}
function confirmNW(type){
  const name=gv('nwn').trim(),nwtype=gv('nwt'),value=gn('nwv');
  if(!name||value<=0){toast('Fill in name and value');return;}
  if(!S.netWorth)S.netWorth={assets:[],debts:[]};if(!S.netWorth[type])S.netWorth[type]=[];
  S.netWorth[type].push({name,type:nwtype,value});S.modal=null;save();toast('Added ✓');render();
}
function delNW(type,i){if(S.netWorth&&S.netWorth[type])S.netWorth[type].splice(i,1);save();render();}
function confirmIncome(){
  const name=gv('isn').trim(),monthly=gn('ism');
  if(!name||monthly<=0){toast('Fill in name and amount');return;}
  if(!S.incomeSources)S.incomeSources=[];S.incomeSources.push({id:Date.now().toString(36),name,monthly});
  S.modal=null;save();toast('Income added ✓');render();
}
function confirmWish(){
  const name=gv('wn').trim(),amount=gn('wa'),waitDays=gn('wd2')||WISH_DAYS;
  if(!name){toast('Fill in a name');return;}
  if(!S.wishlist)S.wishlist=[];
  S.wishlist.push({id:Date.now().toString(36),name,amount,waitDays,addedAt:Date.now(),emotion:''});
  S.modal=null;save();toast('Added to wishlist ✓');render();
}
function delWish(i){S.wishlist.splice(i,1);save();render();}
function buyFromWish(i){
  if(!S.wishlist||!S.wishlist[i])return;
  const w=S.wishlist[i];
  S.impulseAmt=w.amount;S.impulseNote=w.name;S.impulsePendingEmo=w.emotion||'';
  S.wishlist.splice(i,1);S.tab='impulse';save();toast('Ready to buy — check below');render();
}
function saveToWishlist(){
  const amt=+S.impulseAmt||0,name=S.impulseNote||'Unnamed';
  if(!S.wishlist)S.wishlist=[];
  S.wishlist.push({id:Date.now().toString(36),name,amount:amt,waitDays:WISH_DAYS,addedAt:Date.now(),emotion:S.impulsePendingEmo||''});
  S.impulseAmt=0;S.impulseNote='';S.impulsePendingEmo='';
  save();toast('Saved to wishlist — check back in '+WISH_DAYS+' days');S.tab='wishlist';render();
}
function buyItNow(){
  const amt=+S.impulseAmt||0,name=S.impulseNote||'Purchase';
  if(!amt){toast('Enter an amount first');return;}
  if(!S.transactions)S.transactions=[];
  const catId=(S.categories.find(c=>c.id==='other')||S.categories[0]).id;
  S.transactions.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2),name,amount:amt,catId,month:S.month,year:S.year,day:now.getDate(),note:'From impulse check',emotion:S.impulsePendingEmo||'',auto:false});
  markStreak();S.impulseAmt=0;S.impulseNote='';S.impulsePendingEmo='';
  save();toast('Logged ✓');S.tab='today';render();
}
function confirmNewProfile(){const name=gv('pn').trim()||'New Profile';createProfile(name);S.modal=null;}
function saveReflection(){
  const well=gv('refl-well').trim(),hard=gv('refl-hard').trim(),next=gv('refl-next').trim();
  const today=`${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
  const dateLabel=MONTHS[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();
  if(!S.reflections)S.reflections=[];
  S.reflections=S.reflections.filter(r=>r.date!==today);
  S.reflections.push({date:today,dateLabel,emotion:S._reflEmo||'',well,hard,next});
  save();toast('Reflection saved ✓');render();
}
function delTx(id){S.transactions=(S.transactions||[]).filter(t=>t.id!==id);save();toast('Removed');render();}
function delRec(id){S.recurring=(S.recurring||[]).filter(r=>r.id!==id);S.transactions=(S.transactions||[]).filter(t=>t.recurId!==id);save();toast('Removed');render();}
function updPcSilent(k,v){if(!S.paycheck)S.paycheck={};S.paycheck[k]=v;}
function updPc(k,v){updPcSilent(k,v);save();if(typeof v==='string'&&k!=='gross'){render();}}

function addD(type){
  if(!S.paycheck)S.paycheck={preTax:[],postTax:[]};
  if(!S.paycheck.preTax)S.paycheck.preTax=[];if(!S.paycheck.postTax)S.paycheck.postTax=[];
  const defs={pre:['401(k)','HSA','Health insurance','FSA','Dental','Vision'],post:['Roth 401(k)','Union dues','Charity','Other']};
  const used=(type==='pre'?S.paycheck.preTax:S.paycheck.postTax).map(d=>d.label);
  const sug=defs[type].find(d=>!used.includes(d))||'';
  if(type==='pre')S.paycheck.preTax.push({label:sug,amt:0});else S.paycheck.postTax.push({label:sug,amt:0});
  save();render();
}
function remD(type,i){
  if(!S.paycheck)return;
  if(type==='pre'&&S.paycheck.preTax)S.paycheck.preTax.splice(i,1);
  else if(S.paycheck.postTax)S.paycheck.postTax.splice(i,1);
  save();render();
}
function updDSilent(type,i,f,v){
  if(!S.paycheck)S.paycheck={preTax:[],postTax:[]};
  if(!S.paycheck.preTax)S.paycheck.preTax=[];
  if(!S.paycheck.postTax)S.paycheck.postTax=[];
  if(type==='pre'){if(S.paycheck.preTax[i])S.paycheck.preTax[i][f]=v;}
  else{if(S.paycheck.postTax[i])S.paycheck.postTax[i][f]=v;}
}
function updD(type,i,f,v){updDSilent(type,i,f,v);save();}

function resetProfile(){if(!confirm('Clear all data in this profile?'))return;const fresh=freshState();fresh.onboardDone=true;Object.assign(S,fresh);save();toast('Cleared');render();}

try{window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{if((S.darkMode||'auto')==='auto'){applyTheme();render();}});}catch(e){}

render();
</script>
</body>
</html>
